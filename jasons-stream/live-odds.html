<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AADS Live Odds — OBS Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /*
     * OBS Browser Source Settings:
     *   Width:  1920  Height: 80
     *   Custom CSS: body { background: transparent !important; }
     *   Tick: "Shutdown source when not visible"
     *
     * This page syncs live from the Stream Controller via localStorage
     * and BroadcastChannel — place both pages on the same machine.
     */

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: transparent;
      font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
      overflow: hidden;
      width: 1920px;
      height: 80px;
    }

    /* ── Overlay wrapper — centred in the 1920px canvas ── */
    .overlay {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 960px;
      padding-bottom: 5px;
    }

    /* ── AADS Heat Bar panel — solid black, orange border ── */
    .panel {
      position: relative;
      width: 100%;
      background: #000000;
      border: 2px solid #FF6600;
      border-top: none;
      box-shadow: 0 0 18px rgba(255,102,0,0.35), 0 4px 24px rgba(0,0,0,0.9);
      overflow: visible;
      padding: 7px 16px 7px;
    }

    /* Orange accent stripe across the top */
    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: -2px; right: -2px;
      height: 3px;
      background: #FF6600;
    }

    /* ── Main single-row layout ── */
    .main-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Player name + score sides */
    .player-block {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 256px;
      flex-shrink: 0;
    }

    .p1-block { justify-content: flex-end; }
    .p2-block { justify-content: flex-start; }

    .player-name {
      font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    /* P1 = Safety Orange  |  P2 = White */
    .p1-name { color: #FF6600; }
    .p2-name { color: #FFFFFF; }

    .score-chip {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      min-width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .p1-score { color: #FF6600; }
    .p2-score { color: #FFFFFF; }

    /* ── Centre: bar + meta row ── */
    .odds-core {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    /* Probability bar — flat, sharp edges to match tournament aesthetic */
    .bar-track {
      height: 12px;
      background: #333333;
      overflow: hidden;
      display: flex;
    }

    .bar-fill-p1 {
      background: #FF6600;
      height: 100%;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }

    .bar-fill-p2 {
      background: #FFFFFF;
      height: 100%;
      flex: 1;
    }

    /* Meta row: pct — label — pct */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pct-label {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      text-transform: uppercase;
    }

    .p1-pct { color: #FF6600; }
    .p2-pct { color: #A0A0A0; }

    .match-label {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    /* Pulsing orange live dot */
    .live-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #FF6600;
      margin-right: 5px;
      vertical-align: middle;
      position: relative;
      top: -1px;
      animation: livePulse 1.4s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* Break of throw alert — orange banner above panel */
    .break-alert {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #FF6600;
      color: #000000;
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 10.5px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 4px 18px;
      white-space: nowrap;
      box-shadow: 0 -3px 14px rgba(255,102,0,0.55);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }

    .break-alert.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Waiting state */
    .waiting {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      text-align: center;
      padding: 1.6em 0;
    }

    /* UP NEXT badge replaces live dot in setup phase */
    .upnext-badge {
      display: inline-block;
      background: #FF6600;
      color: #000;
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 2px 7px;
      margin-right: 6px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* Dimmed bar fills in setup phase — show strength gap, not live odds */
    .bar-fill-p1.setup-mode {
      opacity: 0.45;
      background: #FF6600;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bar-fill-p2.setup-mode {
      opacity: 0.25;
    }

    .pct-label.setup-mode {
      opacity: 0.5;
    }

    .score-chip.setup-mode {
      opacity: 0;
    }

    /* ── Panel pop-up animation ── */
    /* Panel starts hidden below the canvas, slides up when shown */
    .panel {
      position: relative;
      width: 100%;
      background: #000000;
      border: 2px solid #FF6600;
      border-top: none;
      box-shadow: 0 0 18px rgba(255,102,0,0.35), 0 4px 24px rgba(0,0,0,0.9);
      overflow: visible;
      padding: 7px 16px 7px;
      transform: translateY(110%);
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity   0.3s ease;
    }

    .panel.panel-visible {
      transform: translateY(0);
      opacity: 1;
    }

    /* Waiting state */
    .waiting {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      text-align: center;
      padding: 1.6em 0;
    }

    /* ── Sponsor logo — floats above the panel ── */
    .sponsor-logo-box {
      position: absolute;
      top: -590px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
    }

    .sponsor-logo-box img {
      height: 600px;
      width: auto;
      filter: drop-shadow(0 0 8px rgba(255,102,0,0.6));
    }

    /* ── Token settings panel (top-right, for PC setup) ── */
    #tokenPanel {
      position: fixed;
      top: 28px; right: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.92);
      border: 1px solid rgba(255,102,0,0.5);
      border-radius: 0 0 0 6px;
      padding: 6px 8px;
      display: none;
      gap: 5px;
      align-items: center;
    }
    #tokenPanel.open { display: flex; }
    #tokenPanel input {
      background: #222; border: 1px solid #555; border-radius: 4px;
      color: #fff; font-size: 10px; padding: 3px 7px; width: 190px; outline: none;
    }
    #tokenPanel button {
      background: #FF6600; border: none; border-radius: 4px;
      color: #000; font-size: 9px; font-weight: 900;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 8px; cursor: pointer;
    }
    #tokenToggleBtn {
      position: fixed;
      top: 4px; right: 8px;
      z-index: 9999;
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,102,0,0.35); border-radius: 3px;
      padding: 2px 7px; cursor: pointer;
      -webkit-user-select: none; user-select: none;
      transition: color 0.2s, border-color 0.2s;
    }
    #tokenToggleBtn.tok-active { color: #FF6600; border-color: #FF6600; background: rgba(255,102,0,0.12); }

    /* ── Setup pin toggle button ── */
    #pinBtn {
      position: fixed;
      top: 4px;
      left: 8px;
      z-index: 9999;
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,102,0,0.35);
      border-radius: 3px;
      padding: 2px 7px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    #pinBtn.pin-active {
      color: #FF6600;
      border-color: #FF6600;
      background: rgba(255,102,0,0.12);
    }
  </style>
</head>
<body>

<button id="pinBtn" onclick="togglePin()" title="Keep bar visible for OBS setup">📌 SETUP</button>
<button id="tokenToggleBtn" onclick="toggleTokenPanel()" title="Set GitHub token for cross-device sync">🔑 TOKEN</button>
<div id="tokenPanel">
  <input id="ghTokenInput" type="password" placeholder="ghp_… (GitHub token for cross-device sync)">
  <button onclick="saveToken()">SAVE</button>
</div>

<div class="overlay" id="overlay">
  <div class="waiting" id="waitingMsg">Waiting for stream controller…</div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  AADS Live Odds — OBS Browser Source Overlay
//  Pop-up behaviour: hidden until Jason presses a button.
//  Shows on bull confirm + each leg win. Auto-hides after 5s.
//  Animates bar from previous odds → new odds on each pop-up.
// ══════════════════════════════════════════════════════════

const STREAM_KEY     = 'AADS_STREAM_DATA';
const GH_STREAM_API  = 'https://api.github.com/repos/dowdarts/darts-interview-assistant/contents/jasons-stream/stream-state.json';
const GH_STREAM_RAW  = 'https://raw.githubusercontent.com/dowdarts/darts-interview-assistant/main/jasons-stream/stream-state.json';
let lastTimestamp = 0;
let prevP1Prob    = 50;   // bar's last displayed position
let currentData   = null; // most recent silent-update data
let isVisible     = false;
let hideTimer     = null;
let breakTimeout  = null;
let lastBreakLeg  = null;
let builtOnce     = false; // panel DOM exists?
let pinned        = false; // setup pin: keeps panel always visible

// ── RENDER panel HTML (always hidden after build) ──────────
function buildPanel(data) {
  const overlay   = document.getElementById('overlay');
  const p1Name    = data.p1Name  || 'Player 1';
  const p2Name    = data.p2Name  || 'Player 2';
  const matchLabel = data.matchNum ? 'Match ' + data.matchNum : 'Board 1';

  overlay.innerHTML = `
    <div class="panel" id="panel">
      <div class="sponsor-logo-box">
        <img src="sponsor-logo.png" alt="Sponsor">
      </div>
      <div class="break-alert" id="breakAlert"></div>
      <div class="main-row">
        <div class="player-block p1-block">
          <span class="player-name p1-name" id="p1Name">${p1Name}</span>
          <span class="score-chip p1-score" id="scoreP1">0</span>
        </div>
        <div class="odds-core">
          <div class="bar-track">
            <div class="bar-fill-p1" id="fillP1" style="width:50%;"></div>
            <div class="bar-fill-p2" id="fillP2"></div>
          </div>
          <div class="meta-row">
            <span class="pct-label p1-pct" id="pct1">50%</span>
            <span class="match-label" id="matchLabel"><span class="live-dot"></span>${matchLabel} &middot; LIVE ODDS</span>
            <span class="pct-label p2-pct" id="pct2">50%</span>
          </div>
        </div>
        <div class="player-block p2-block">
          <span class="score-chip p2-score" id="scoreP2">0</span>
          <span class="player-name p2-name" id="p2Name">${p2Name}</span>
        </div>
      </div>
    </div>
  `;
  builtOnce = true;
}

// ── UPDATE panel content silently (no show/hide change) ────
function updatePanelContent(data) {
  const p1 = document.getElementById('p1Name');
  const p2 = document.getElementById('p2Name');
  const s1 = document.getElementById('scoreP1');
  const s2 = document.getElementById('scoreP2');
  const ml = document.getElementById('matchLabel');
  if (p1) p1.textContent = data.p1Name || 'Player 1';
  if (p2) p2.textContent = data.p2Name || 'Player 2';
  if (s1) s1.textContent = data.p1Score || 0;
  if (s2) s2.textContent = data.p2Score || 0;
  if (ml) {
    const matchLabel = data.matchNum ? 'Match ' + data.matchNum : 'Board 1';
    ml.innerHTML = `<span class="live-dot"></span>${matchLabel} &middot; LIVE ODDS`;
  }
}

// ── SHOW panel with prev→new odds animation ──────────────────
function showPanel(data) {
  const newProb = Math.max(2, Math.min(98, data.p1Prob || 50));
  const newP2   = 100 - newProb;

  // Build DOM on first use
  if (!builtOnce) buildPanel(data);

  // Update all content fields
  updatePanelContent(data);

  // 1. Snap bar to PREVIOUS odds instantly (viewer sees the "before" position)
  const fill = document.getElementById('fillP1');
  const pct1 = document.getElementById('pct1');
  const pct2 = document.getElementById('pct2');
  if (fill) { fill.style.transition = 'none'; fill.style.width = prevP1Prob + '%'; }
  if (pct1) pct1.textContent = prevP1Prob + '%';
  if (pct2) pct2.textContent = (100 - prevP1Prob) + '%';

  // 2. Slide panel in
  const panel = document.getElementById('panel');
  if (panel) {
    void panel.offsetHeight; // force reflow
    panel.classList.add('panel-visible');
  }

  // 3. After 300ms, animate bar to NEW odds (viewer sees the change)
  setTimeout(() => {
    if (fill) {
      fill.style.transition = 'width 0.7s cubic-bezier(0.4, 0, 0.2, 1)';
      fill.style.width = newProb + '%';
    }
    if (pct1) pct1.textContent = newProb + '%';
    if (pct2) pct2.textContent = newP2  + '%';
  }, 300);

  // 4. Handle break alert
  triggerBreakAlert(data.lastBreak);

  // 5. Record new prob as "previous" for next pop-up
  prevP1Prob = newProb;
  isVisible  = true;

  // 6. Auto-hide 5 seconds after bar finishes animating (~1.2s)
  // Skip if pinned (setup mode keeps bar visible)
  clearTimeout(hideTimer);
  if (!pinned) hideTimer = setTimeout(hidePanel, 5000);
}

// ── HIDE panel (slide back down) ───────────────────────────
function hidePanel() {
  if (pinned) return; // setup pin: stay visible
  const panel = document.getElementById('panel');
  if (panel) panel.classList.remove('panel-visible');
  isVisible = false;
}

// ── TOKEN PANEL toggle ────────────────────────────────────
function toggleTokenPanel() {
  const panel  = document.getElementById('tokenPanel');
  const btn    = document.getElementById('tokenToggleBtn');
  const input  = document.getElementById('ghTokenInput');
  const isOpen = panel.classList.contains('open');
  if (!isOpen) {
    input.value = localStorage.getItem('githubToken') || '';
    panel.classList.add('open');
    btn.classList.add('tok-active');
    input.focus();
  } else {
    panel.classList.remove('open');
    btn.classList.remove('tok-active');
  }
}
function saveToken() {
  const val = (document.getElementById('ghTokenInput').value || '').trim();
  if (val) localStorage.setItem('githubToken', val);
  else     localStorage.removeItem('githubToken');
  document.getElementById('tokenPanel').classList.remove('open');
  document.getElementById('tokenToggleBtn').classList.remove('tok-active');
  pollGitHub(); // immediately try polling with new token
}

// ── SETUP PIN toggle ──────────────────────────────────────
function togglePin() {
  pinned = !pinned;
  const btn = document.getElementById('pinBtn');
  if (pinned) {
    btn.textContent = '📌 LIVE';
    btn.classList.add('pin-active');
    // If we have panel data, show it now
    if (!builtOnce && currentData) buildPanel(currentData);
    if (builtOnce) {
      const panel = document.getElementById('panel');
      if (panel) panel.classList.add('panel-visible');
      isVisible = true;
    }
    clearTimeout(hideTimer);
  } else {
    btn.textContent = '📌 SETUP';
    btn.classList.remove('pin-active');
    // Slide bar back down
    const panel = document.getElementById('panel');
    if (panel) panel.classList.remove('panel-visible');
    isVisible = false;
  }
}

// ── BREAK OF THROW alert ───────────────────────────────────
function triggerBreakAlert(breakData) {
  const alertEl = document.getElementById('breakAlert');
  if (!alertEl) return;
  if (breakData && breakData.leg !== lastBreakLeg) {
    lastBreakLeg = breakData.leg;
    alertEl.textContent = '\ud83d\udd34 Break of Throw \u2014 Leg ' + breakData.leg + ': ' + (breakData.name || '');
    alertEl.classList.add('visible');
    clearTimeout(breakTimeout);
    breakTimeout = setTimeout(() => alertEl.classList.remove('visible'), 6000);
  }
}

// ── HANDLE incoming data ───────────────────────────────────
function handleData(data) {
  if (!data || data.timestamp === lastTimestamp) return;
  lastTimestamp = data.timestamp;
  currentData   = data;

  if (data.showOverlay) {
    // Triggered event (bull confirm or leg win) — pop up the overlay
    showPanel(data);
  } else {
    // Silent update — just keep content current in background
    if (builtOnce) updatePanelContent(data);
    else buildPanel(data);  // build DOM silently so it's ready
  }
}

// ── GITHUB POLLING (cross-device sync) ────────────────────
async function pollGitHub() {
  const token = localStorage.getItem('githubToken');
  try {
    if (token) {
      const r = await fetch(GH_STREAM_API + '?t=' + Date.now(), {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
        cache: 'no-store'
      });
      if (r.ok) {
        const d = await r.json();
        const text = decodeURIComponent(escape(atob(d.content.replace(/\s/g, ''))));
        handleData(JSON.parse(text));
      }
    } else {
      // No token — raw URL (may be cached up to ~5 min by GitHub CDN)
      const r = await fetch(GH_STREAM_RAW + '?t=' + Date.now(), { cache: 'no-store' });
      if (r.ok) handleData(await r.json());
    }
  } catch(_) {}
}
setInterval(pollGitHub, 3000);
pollGitHub();

// ── STORAGE / BROADCAST listeners ─────────────────────────
function readFromStorage() {
  try {
    const raw = localStorage.getItem(STREAM_KEY);
    if (raw) handleData(JSON.parse(raw));
  } catch(_) {}
}

try {
  const bc = new BroadcastChannel('aads_stream');
  bc.onmessage = (e) => { if (e.data) handleData(e.data); };
} catch(_) {}

window.addEventListener('storage', (e) => {
  if (e.key === STREAM_KEY && e.newValue) {
    try { handleData(JSON.parse(e.newValue)); } catch(_) {}
  }
});

// Polling fallback — 500ms for OBS Chromium contexts
setInterval(readFromStorage, 500);
readFromStorage();
</script>
</body>
</html>
