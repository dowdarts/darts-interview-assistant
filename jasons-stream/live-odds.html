<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AADS Live Odds — OBS Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /*
     * OBS Browser Source Settings:
     *   Width:  1920  Height: 80
     *   Custom CSS: body { background: transparent !important; }
     *   Tick: "Shutdown source when not visible"
     *
     * This page syncs live from the Stream Controller via localStorage
     * and BroadcastChannel — place both pages on the same machine.
     */

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: transparent;
      font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
      overflow: hidden;
      width: 1920px;
      height: 80px;
    }

    /* ── Overlay wrapper — centred in the 1920px canvas ── */
    .overlay {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 960px;
      padding-bottom: 5px;
    }

    /* ── AADS Heat Bar panel — solid black, orange border ── */
    .panel {
      position: relative;
      width: 100%;
      background: #000000;
      border: 2px solid #FF6600;
      border-top: none;
      box-shadow: 0 0 18px rgba(255,102,0,0.35), 0 4px 24px rgba(0,0,0,0.9);
      overflow: visible;
      padding: 7px 16px 7px;
    }

    /* Orange accent stripe across the top */
    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: -2px; right: -2px;
      height: 3px;
      background: #FF6600;
    }

    /* ── Main single-row layout ── */
    .main-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Player name + score sides */
    .player-block {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 256px;
      flex-shrink: 0;
    }

    .p1-block { justify-content: flex-end; }
    .p2-block { justify-content: flex-start; }

    .player-name {
      font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    /* P1 = Safety Orange  |  P2 = White */
    .p1-name { color: #FF6600; }
    .p2-name { color: #FFFFFF; }

    .score-chip {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      min-width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .p1-score { color: #FF6600; }
    .p2-score { color: #FFFFFF; }

    /* ── Centre: bar + meta row ── */
    .odds-core {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    /* Probability bar — flat, sharp edges to match tournament aesthetic */
    .bar-track {
      height: 12px;
      background: #333333;
      overflow: hidden;
      display: flex;
    }

    .bar-fill-p1 {
      background: #FF6600;
      height: 100%;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }

    .bar-fill-p2 {
      background: #FFFFFF;
      height: 100%;
      flex: 1;
    }

    /* Meta row: pct — label — pct */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pct-label {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      text-transform: uppercase;
    }

    .p1-pct { color: #FF6600; }
    .p2-pct { color: #A0A0A0; }

    .match-label {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    /* Pulsing orange live dot */
    .live-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #FF6600;
      margin-right: 5px;
      vertical-align: middle;
      position: relative;
      top: -1px;
      animation: livePulse 1.4s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* Break of throw alert — orange banner above panel */
    .break-alert {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #FF6600;
      color: #000000;
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 10.5px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 4px 18px;
      white-space: nowrap;
      box-shadow: 0 -3px 14px rgba(255,102,0,0.55);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }

    .break-alert.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Waiting state */
    .waiting {
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      text-align: center;
      padding: 1.6em 0;
    }

    /* UP NEXT badge replaces live dot in setup phase */
    .upnext-badge {
      display: inline-block;
      background: #FF6600;
      color: #000;
      font-family: 'Oswald', Arial, sans-serif;
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 2px 7px;
      margin-right: 6px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* Dimmed bar fills in setup phase — show strength gap, not live odds */
    .bar-fill-p1.setup-mode {
      opacity: 0.45;
      background: #FF6600;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bar-fill-p2.setup-mode {
      opacity: 0.25;
    }

    .pct-label.setup-mode {
      opacity: 0.5;
    }

    .score-chip.setup-mode {
      opacity: 0;
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="waiting" id="waitingMsg">Waiting for stream controller…</div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  AADS Live Odds — OBS Browser Source Overlay
//  Receives data from the Stream Controller (index.html)
//  via localStorage and BroadcastChannel.
//
//  Same-machine, same-origin: storage events fire reliably.
//  Polling fallback every 500ms for OBS Chromium contexts.
// ══════════════════════════════════════════════════════════

const STREAM_KEY = 'AADS_STREAM_DATA';
let lastTimestamp = 0;
let breakTimeout  = null;

// Build overlay HTML once data is available
function renderOverlay(data) {
  const overlay    = document.getElementById('overlay');
  const isSetup    = data.phase === 'setup';
  // Setup phase: show strength-gap base odds (dimmed). Live phase: show full live odds.
  const dispProb   = isSetup
    ? Math.max(4, Math.min(96, data.baseProb || 50))
    : Math.max(2, Math.min(98, data.p1Prob  || 50));
  const dispP2     = 100 - dispProb;
  const p1Name     = data.p1Name || 'Player 1';
  const p2Name     = data.p2Name || 'Player 2';
  const p1Score    = data.p1Score || 0;
  const p2Score    = data.p2Score || 0;
  const matchLabel = data.matchNum ? 'Match ' + data.matchNum : 'Board 1';
  const setupClass = isSetup ? ' setup-mode' : '';
  const centerBadge = isSetup
    ? `<span class="upnext-badge">UP NEXT</span>${matchLabel} · BULL UP`
    : `<span class="live-dot"></span>${matchLabel} · LIVE ODDS`;

  overlay.innerHTML = `
    <div class="panel">
      <div class="break-alert" id="breakAlert"></div>
      <div class="main-row">
        <div class="player-block p1-block">
          <span class="player-name p1-name">${p1Name}</span>
          <span class="score-chip p1-score${setupClass}" id="scoreP1">${p1Score}</span>
        </div>
        <div class="odds-core">
          <div class="bar-track">
            <div class="bar-fill-p1${setupClass}" id="fillP1" style="width:${dispProb}%;"></div>
            <div class="bar-fill-p2${setupClass}" id="fillP2"></div>
          </div>
          <div class="meta-row">
            <span class="pct-label p1-pct${setupClass}" id="pct1">${dispProb}%</span>
            <span class="match-label">${centerBadge}</span>
            <span class="pct-label p2-pct${setupClass}" id="pct2">${dispP2}%</span>
          </div>
        </div>
        <div class="player-block p2-block">
          <span class="score-chip p2-score${setupClass}" id="scoreP2">${p2Score}</span>
          <span class="player-name p2-name">${p2Name}</span>
        </div>
      </div>
    </div>
  `;
}

// Animate bar width changes without full re-render
function updateBar(data) {
  const p1Prob = Math.max(2, Math.min(98, data.p1Prob || 50));
  const p2Prob = 100 - p1Prob;

  const fillP1 = document.getElementById('fillP1');
  if (fillP1) fillP1.style.width = p1Prob + '%';

  const pct1 = document.getElementById('pct1');
  const pct2 = document.getElementById('pct2');
  if (pct1) pct1.textContent = p1Prob + '%';
  if (pct2) pct2.textContent = p2Prob + '%';

  const scoreP1 = document.getElementById('scoreP1');
  const scoreP2 = document.getElementById('scoreP2');
  if (scoreP1) scoreP1.textContent = data.p1Score || 0;
  if (scoreP2) scoreP2.textContent = data.p2Score || 0;

  // Break of throw alert
  triggerBreakAlert(data.lastBreak);
}

let lastBreakLeg = null;

function triggerBreakAlert(breakData) {
  const alertEl = document.getElementById('breakAlert');
  if (!alertEl) return;

  if (breakData && breakData.leg !== lastBreakLeg) {
    lastBreakLeg = breakData.leg;
    alertEl.textContent = '🔴 Break of Throw — Leg ' + breakData.leg + ': ' + (breakData.name || '');
    alertEl.classList.add('visible');

    clearTimeout(breakTimeout);
    breakTimeout = setTimeout(() => {
      alertEl.classList.remove('visible');
    }, 6000);
  }
}

// Process any incoming data object
let lastPhase = null;

function handleData(data) {
  if (!data || data.timestamp === lastTimestamp) return;
  lastTimestamp = data.timestamp;

  const waitMsg  = document.getElementById('waitingMsg');
  const phaseChanged = data.phase !== lastPhase;
  lastPhase = data.phase;

  if (waitMsg || phaseChanged) {
    // First data ever, or phase changed (e.g. setup→live, complete→setup) — full re-render
    renderOverlay(data);
    return;
  }

  // Already rendered in same phase — just update bar and scores
  updateBar(data);
}

// Read from localStorage (works for polling and cross-context)
function readFromStorage() {
  try {
    const raw = localStorage.getItem(STREAM_KEY);
    if (raw) handleData(JSON.parse(raw));
  } catch(_) {}
}

// BroadcastChannel (same-browser, same-origin)
try {
  const bc = new BroadcastChannel('aads_stream');
  bc.onmessage = (e) => { if (e.data) handleData(e.data); };
} catch(_) {}

// Storage event (fires in other tabs/windows of same origin)
window.addEventListener('storage', (e) => {
  if (e.key === STREAM_KEY && e.newValue) {
    try { handleData(JSON.parse(e.newValue)); } catch(_) {}
  }
});

// Polling fallback (500ms) — ensures OBS Chromium contexts pick up updates
setInterval(readFromStorage, 500);

// Initial read on load
readFromStorage();
</script>
</body>
</html>
