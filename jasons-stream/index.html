//  AADS Stream Controller ΟΔβ²§βÄù Jason's Live Broadcast Tool

const STREAM_KEY = 'AADS_STREAM_DATA';

const RAW_URL    = 'https://raw.githubusercontent.com/dowdarts/darts-interview-assistant/main/event-data.json';

let eventData = null;

try { bc = new BroadcastChannel('aads_stream'); } catch(_) {}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ STATE ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§

// ΟΔβÄùβ²§ΟΔβÄùβ²§ MATCH DATA ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function getBoard1Matches() {
  if (!eventData || !eventData.allPairs) return [];
  return eventData.allPairs
    .filter(p => p.board1)
    .map(p => p.board1)
    .sort((a, b) => a.matchNum - b.matchNum);
}

function isMatchUnlocked(matchNum, allMatches) {
  const idx = allMatches.findIndex(m => m.matchNum === matchNum);
  if (idx <= 0) return true;
  for (let i = 0; i < idx; i++) {
    if (!S.completedMatches.includes(allMatches[i].matchNum)) return false;
  }
  return true;
}

function selectMatch(matchNum) {
  const matches = getBoard1Matches();
  const m = matches.find(match => match.matchNum === matchNum);
  if (!m || !isMatchUnlocked(matchNum, matches)) return;
  S.currentMatch     = m;
  S.selectedMatchNum = m.matchNum;
  S.p1.name          = m.player1 || '';
  S.p2.name          = m.player2 || '';
  const cs1 = getPlayerCareerStats(S.p1.name);
  const cs2 = getPlayerCareerStats(S.p2.name);
  S.p1.avg3DA   = (cs1 && cs1.careerAvg   > 0) ? cs1.careerAvg   : 50;
  S.p1.checkout = (cs1 && cs1.careerCheckout > 0) ? cs1.careerCheckout : 35;
  S.p2.avg3DA   = (cs2 && cs2.careerAvg   > 0) ? cs2.careerAvg   : 50;
  S.p2.checkout = (cs2 && cs2.careerCheckout > 0) ? cs2.careerCheckout : 35;
  S.bullWinner    = 0;
  S.bullConfirmed = false;
  S.p1Score       = 0;
  S.p2Score       = 0;
  S.legHistory    = [];
  S.matchPoint    = 3;
  S.screen        = 'matchSetup';
  renderApp();
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ PERSISTENCE ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§

// ΟΔβÄùβ²§ΟΔβÄùβ²§ SYNC WITH DENIS'S APP ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
let _denisConnected = false;

function buildLegHistory(legs) {
  return (legs || []).map(l => {
    const winnerNum = l.winner === S.p1.name ? 1 : 2;
    const expNum    = expectedStarter(l.legNumber);
    return { leg: l.legNumber, winner: winnerNum, wasBreak: winnerNum !== expNum };
  });
}

function applyDenisData(data) {
  if (!data || !S.currentMatch) return;

  // Match complete ΟΔβ²§βÄù Denis finished it
  const matchResult = (data.recentMatches || []).find(m => m.matchNum === S.currentMatch.matchNum);
  if (matchResult) {
    S.p1Score    = matchResult.score1 || 0;
    S.p2Score    = matchResult.score2 || 0;
    S.legHistory = buildLegHistory(matchResult.legs || []);
    if (S.screen === 'live' || S.screen === 'matchSetup') {
      if (!S.completedMatches.includes(S.currentMatch.matchNum)) {
        S.completedMatches.push(S.currentMatch.matchNum);
        saveJasonState();
      }
      S.screen = 'complete';
      pushToOverlay();
      renderApp();
    }
    return;
  }

  // In-progress update
  const lmp = data.liveMatchProgress;
  if (!lmp || lmp.matchNum !== S.currentMatch.matchNum) return;

  S.p1Score       = lmp.score1 || 0;
  S.p2Score       = lmp.score2 || 0;
  S.legHistory    = buildLegHistory(lmp.legs || []);
  S.denisLegCount = (lmp.legs || []).length;

  if (S.screen === 'live') {
    pushToOverlay();
    renderApp();
  }
}

function connectToDenis() {
  if (typeof PeerSync === 'undefined') return;
  PeerSync.connectAsViewer(DENIS_CODE,
    (data) => { applyDenisData(data); },
    (status) => {
      S.syncStatus    = status;
      _denisConnected = (status === 'connected');
      const el = document.getElementById('syncStatusBadge');
      if (el) {
        el.textContent = status === 'connected' ? 'ΟΔβÄî¬è Denis connected' : 'ΟΔβÄî≈£ Connecting to DenisΟΔβ²§¬Π';
        el.style.color = status === 'connected' ? 'var(--green)' : 'var(--text-muted)';
      }
      if (status === 'disconnected' || status === 'error') {
        setTimeout(() => { if (!_denisConnected) connectToDenis(); }, 8000);
      }
    }
  );
}
setInterval(() => { if (!_denisConnected) connectToDenis(); }, 15000);

// ΟΔβÄùβ²§ΟΔβÄùβ²§ ODDS ENGINE ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function calculateLiveOdds() {
  if (!S.bullWinner) return 50;
  let p = 50 + (S.p1.avg3DA - S.p2.avg3DA) * 1.5;
  p += (S.bullWinner === 1) ? 8.6 : -8.6;
  p += (S.p1Score - S.p2Score) * 15;
  S.legHistory.forEach(leg => {
    if (leg.wasBreak) p += (leg.winner === 1) ? 10 : -10;
  });
  if (Math.max(S.p1Score, S.p2Score) >= S.matchPoint - 1) {
    p = Math.min(95, Math.max(5, p));
  }
  return Math.min(98, Math.max(2, Math.round(p)));
}

function expectedStarter(legNum) {
  const bw = S.bullWinner;
  return (legNum % 2 === 1) ? bw : (bw === 1 ? 2 : 1);
}

function currentLegNum() { return S.p1Score + S.p2Score + 1; }

function throwHolder() {
  const starter = expectedStarter(currentLegNum());
  return starter === 1 ? S.p1.name : S.p2.name;
}

function getLastBreak() {
  const breaks = S.legHistory.filter(l => l.wasBreak);
  if (!breaks.length) return null;
  const last = breaks[breaks.length - 1];
  return { winner: last.winner, name: last.winner === 1 ? S.p1.name : S.p2.name, leg: last.leg };
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ PUSH TO OBS OVERLAY ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function pushToOverlay() {
  const p1Prob = calculateLiveOdds();
  const data = {
    p1Name:    S.p1.name,
    p2Name:    S.p2.name,
    p1Prob,
    p2Prob:    100 - p1Prob,
    p1Score:   S.p1Score,
    p2Score:   S.p2Score,
    matchPoint: S.matchPoint,
    lastBreak:  getLastBreak(),
    matchNum:   S.currentMatch ? S.currentMatch.matchNum : null,
    timestamp:  Date.now()
  };
  localStorage.setItem(STREAM_KEY, JSON.stringify(data));
  if (bc) try { bc.postMessage(data); } catch(_) {}
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ PLAYER STATS ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function getPlayerRecord(name) {
  if (!eventData) return null;
  const all = [...(eventData.standingsA || []), ...(eventData.standingsB || [])];
  return all.find(s => s.name === name) || null;
}
function getLocalPlayerStats(name) {
  try {
    const stored = localStorage.getItem('AADS_PLAYER_STATS');
    if (!stored) return null;
    return JSON.parse(stored)[name] || null;
  } catch(_) { return null; }
}
function saveLocalPlayerStats(name, stats) {
  try {
    const stored = localStorage.getItem('AADS_PLAYER_STATS');
    const data = stored ? JSON.parse(stored) : {};
    data[name] = { careerAvg: stats.careerAvg, careerCheckout: stats.careerCheckout,
                   careerMatches: stats.careerMatches, careerMatchWins: stats.careerMatchWins,
                   notes: stats.notes };
    localStorage.setItem('AADS_PLAYER_STATS', JSON.stringify(data));
  } catch(_) {}
}
function getPlayerCareerStats(name) {
  if (!eventData || !eventData.playerStats) return getLocalPlayerStats(name);
  const base  = eventData.playerStats.find(p => p.name === name) || null;
  const local = getLocalPlayerStats(name);
  if (!local) return base;
  return { name, careerAvg: 0, careerCheckout: 0, careerMatches: 0, careerMatchWins: 0, notes: '',
           ...(base || {}), ...local };
}
function getPlayerProvince(name) {
  if (!eventData) return null;
  const rec = getPlayerRecord(name);
  return rec ? rec.province : null;
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ NEXT OPPONENT ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function getNextOpponent(forPlayerName) {
  if (!eventData || !S.currentMatch) return null;
  const track   = forPlayerName || (S.p1Score >= S.p2Score ? S.p1.name : S.p2.name);
  const curNum  = S.currentMatch.matchNum;
  const upcoming = eventData.upcomingMatches || [];
  for (const m of upcoming) {
    if (m.matchNum <= curNum) continue;
    if (m.player1 === track || m.player2 === track) {
      const opp  = (m.player1 === track) ? m.player2 : m.player1;
      const prov = (m.player1 === track) ? m.player2Province : m.player1Province;
      return { name: opp, province: prov, matchNum: m.matchNum, time: m.time, board: m.board };
    }
  }
  return null;
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ NARRATIVE GENERATOR ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function buildNarratives() {
  const items = [];
  const p1 = S.p1.name || 'Player 1';
  const p2 = S.p2.name || 'Player 2';
  const lastBreak = getLastBreak();

  const gap3DA       = Math.abs(S.p1.avg3DA - S.p2.avg3DA);
  const p1IsFinisher = S.p1.checkout >= S.p2.checkout;
  let compText;
  if (gap3DA >= 5 && !p1IsFinisher) {
    compText = `Jason: Contrast ${p1}'s power scoring (${S.p1.avg3DA} avg) against ${p2}'s clinical finishing (${S.p2.checkout}% checkout). Which style takes the win today?`;
  } else if (gap3DA >= 5 && p1IsFinisher) {
    compText = `${p1} holds the edge in both scoring (${S.p1.avg3DA} avg) and checkout (${S.p1.checkout}%). Talk about whether ${p2} at ${S.p2.avg3DA} avg can keep pace.`;
  } else {
    compText = `These two are closely matched ΟΔβ²§βÄù ${p1}: ${S.p1.avg3DA} avg / ${S.p1.checkout}% checkout vs ${p2}: ${S.p2.avg3DA} avg / ${S.p2.checkout}%. Who wins the mental game?`;
  }
  items.push({ label: 'Comparison', text: compText, style: '' });

  if (lastBreak) {
    items.push({
      label: 'ΟΑ≈ΗβÄù¬¥ Break of Throw',
      text: `${lastBreak.name} broke the throw in Leg ${lastBreak.leg}! This is the darts equivalent of a break of serve and it's just moved the live odds significantly. Tell the audience why this matters ΟΔβ²§βÄù the throw holder is now under extra pressure to break back.`,
      style: 'urgent'
    });
  } else if (S.legHistory.length > 0 && S.screen === 'live') {
    const holder = throwHolder();
    items.push({
      label: 'Throw Pattern',
      text: `${holder} has the throw for Leg ${currentLegNum()}. So far no breaks ΟΔβ²§βÄù both players are holding their serve. Watch if the pattern holds or if a break changes the match picture completely.`,
      style: ''
    });
  }

  const p1Ahead = S.p1Score > S.p2Score;
  const tied    = S.p1Score === S.p2Score && S.p1Score > 0;
  const leader  = p1Ahead ? p1 : p2;
  const trailer = p1Ahead ? p2 : p1;
  const isMatchPoint = Math.max(S.p1Score, S.p2Score) >= S.matchPoint - 1;
  const isDecider    = S.p1Score === S.matchPoint - 1 && S.p2Score === S.matchPoint - 1;

  if (S.screen === 'live' && S.p1Score === 0 && S.p2Score === 0) {
    items.push({
      label: 'Set The Scene',
      text: `Board 1 is live ΟΔβ²§βÄù ${p1} vs ${p2}. ${getPlayerProvince(p1) ? p1 + ' (' + getPlayerProvince(p1) + ')' : p1} against ${getPlayerProvince(p2) ? p2 + ' (' + getPlayerProvince(p2) + ')' : p2}. Build the atmosphere for the viewers ΟΔβ²§βÄù what do they need to know about these two players going into this match?`,
      style: 'info'
    });
  } else if (isDecider) {
    items.push({
      label: 'ΟΑ≈Η¬èβÄ† Deciding Leg',
      text: `IT'S THE DECIDING LEG! Legs are level at ${S.p1Score}ΟΔβ²§βÄ€${S.p2Score}. Talk about what this win means in the standings ΟΔβ²§βÄù and ask viewers if either player has the mental strength to close it out. The throw holder ${throwHolder()} has a small edge.`,
      style: 'urgent'
    });
  } else if (isMatchPoint) {
    items.push({
      label: 'ΟΔ≈Γ¬Γ Match Point',
      text: `${leader} is ONE LEG AWAY from winning! Can ${trailer} find a response and force a decider? Build the tension ΟΔβ²§βÄù this is the biggest moment in the match for the audience.`,
      style: 'urgent'
    });
  } else if (tied) {
    items.push({
      label: 'Evenly Matched',
      text: `All square at ${S.p1Score}ΟΔβ²§βÄ€${S.p2Score}. This match is perfectly poised ΟΔβ²§βÄù talk about who has the momentum and whether the throw pattern gives anyone an edge heading into Leg ${currentLegNum()}.`,
      style: ''
    });
  } else if (S.legHistory.length >= 2) {
    items.push({
      label: 'Match Story',
      text: `${leader} leads ${Math.max(S.p1Score, S.p2Score)}ΟΔβ²§βÄ€${Math.min(S.p1Score, S.p2Score)}. Talk about what's working for ${leader} ΟΔβ²§βÄù is it the scoring, the finishing, or are they benefiting from the throw pattern?`,
      style: ''
    });
  }

  const nextOpp = getNextOpponent();
  if (nextOpp) {
    items.push({
      label: 'Look-Ahead',
      text: `After this match, keep an eye on ${nextOpp.name}${nextOpp.province ? ' (' + nextOpp.province + ')' : ''} ΟΔβ²§βÄù Match ${nextOpp.matchNum} at ${nextOpp.time || 'TBD'} on Board ${nextOpp.board || 1}. Worth flagging for viewers.`,
      style: 'info'
    });
  }
  return items;
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ DATA FETCH ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§

  return `

          const wName = l.winner === 1 ? S.p1.name : S.p2.name;
          return `<div class="leg-log-row ${l.wasBreak ? 'was-break' : 'was-hold'}">Leg ${l.leg}: ${wName} ΟΔβ²§βÄù ${l.wasBreak ? 'ΟΑ≈ΗβÄù¬¥ BREAK' : 'ΟΔ≈™βÄ€ Hold'}</div>`;
        }).join('')}` : ''}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>Narrative Prompts</h2></div>
      <div class="card-body">
        ${narratives.map(n => `
          <div class="narrative ${n.style || ''}">
            <div class="narrative-label">${n.label}</div>
            ${n.text}
          </div>
        `).join('')}
      </div>
    </div>

    ${nextOpp ? `
    <div class="card" style="border-color:rgba(33,150,243,0.3);background:rgba(33,150,243,0.05);">
      <div class="card-body">
        <div style="font-family:var(--font-display);font-size:0.72em;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);margin-bottom:0.4em;">Look-Ahead Ο²¬Ζ Next Match</div>
        <div style="font-size:0.9em;">
          ${S.p1Score >= S.p2Score ? S.p1.name : S.p2.name} faces
          <strong>${nextOpp.name}${nextOpp.province ? ' (' + nextOpp.province + ')' : ''}</strong>
          in Match ${nextOpp.matchNum} at ${nextOpp.time || 'TBD'} ΟΔβ²§βÄù Board ${nextOpp.board || 1}
        </div>
      </div>
    </div>` : ''}

    <div class="row" style="margin-bottom:1.5em;">
      <button class="btn secondary" id="editSetupBtn" style="margin:0;">ΟΔ≈Γβ³Δ Match Setup</button>
    </div>
  `;
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ RENDER: COMPLETE ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function renderComplete() {
  const winnerNum  = S.p1Score >= S.matchPoint ? 1 : 2;
  const winner     = winnerNum === 1 ? S.p1.name : S.p2.name;
  const wScore     = Math.max(S.p1Score, S.p2Score);
  const lScore     = Math.min(S.p1Score, S.p2Score);
  const breaks     = S.legHistory.filter(l => l.wasBreak).length;
  const narratives = buildNarratives();
  const nextOpp    = getNextOpponent(winner);

  return `
    <div style="text-align:center;padding:1.5em 0 1.2em;">
      <div style="font-family:var(--font-display);font-size:0.72em;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.3em;">Match Complete</div>
      <div class="complete-winner">${winner}</div>
      <div class="complete-score">${wScore}ΟΔβ²§βÄ€${lScore}</div>
      <div style="font-size:0.84em;color:var(--text-muted);margin-top:0.3em;">
        ${breaks} break${breaks !== 1 ? 's' : ''} of throw Ο²¬Ζ Best of ${S.matchPoint * 2 - 1}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>Match Summary</h2></div>
      <div class="card-body">
        ${S.legHistory.map(l => {
          const wName = l.winner === 1 ? S.p1.name : S.p2.name;
          return `<div class="leg-log-row ${l.wasBreak ? 'was-break' : 'was-hold'}">Leg ${l.leg}: ${wName} ${l.wasBreak ? 'ΟΑ≈ΗβÄù¬¥ BREAK of Throw' : 'ΟΔ≈™βÄ€ Hold'}</div>`;
        }).join('')}
      </div>
    </div>

    ${nextOpp ? `
    <div class="card" style="border-color:rgba(33,150,243,0.3);background:rgba(33,150,243,0.05);">
      <div class="card-body">
        <div style="font-family:var(--font-display);font-size:0.72em;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);margin-bottom:0.4em;">${winner}'s Next Match</div>
        <div style="font-size:0.9em;">
          ${winner} faces <strong>${nextOpp.name}${nextOpp.province ? ' (' + nextOpp.province + ')' : ''}</strong>
          in Match ${nextOpp.matchNum} at ${nextOpp.time || 'TBD'} ΟΔβ²§βÄù Board ${nextOpp.board || 1}
        </div>
      </div>
    </div>` : ''}

    <div class="card">
      <div class="card-header"><h2>Post-Match Narrative</h2></div>
      <div class="card-body">
        ${narratives.map(n => `
          <div class="narrative ${n.style || ''}">
            <div class="narrative-label">${n.label}</div>
            ${n.text}
          </div>
        `).join('')}
        <div class="narrative info">
          <div class="narrative-label">Interview Trigger</div>
          Once ${winner} finishes the handshake, open the Interview App ΟΔβ²§βÄù the system will auto-generate post-match questions based on today's leg data.
        </div>
      </div>
    </div>

    <button class="btn" id="backToListBtn">ΟΔβÄ†¬ê Back to Match List</button>
  `;
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ RENDER: MAIN ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function renderApp() {
  const app = document.getElementById('app');
  if      (S.screen === 'matchList')  app.innerHTML = renderMatchList();
  else if (S.screen === 'matchSetup') app.innerHTML = renderMatchSetup();
  else if (S.screen === 'live')       app.innerHTML = renderLive();
  else                                app.innerHTML = renderComplete();
  bindEvents();
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ EVENT BINDING ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function bindEvents() {
  if (S.screen === 'matchList') {
    const matches = getBoard1Matches();
    matches.forEach(m => {
      const btn = document.getElementById('matchBtn' + m.matchNum);
      if (btn) btn.onclick = () => selectMatch(m.matchNum);
    });
  }

  if (S.screen === 'matchSetup') {
    document.getElementById('backToListBtn').onclick = () => { S.screen = 'matchList'; renderApp(); };
    document.getElementById('bull1Btn').onclick = () => { S.bullWinner = 1; renderApp(); };
    document.getElementById('bull2Btn').onclick = () => { S.bullWinner = 2; renderApp(); };

    const confirmBtn = document.getElementById('confirmBullBtn');
    if (confirmBtn) {
      confirmBtn.onclick = () => {
        S.bullConfirmed = true;
        S.screen = 'live';
        pushToOverlay();
        renderApp();
      };
    }

    // Stats editing
    [1, 2].forEach(playerNum => {
      const pName     = playerNum === 1 ? S.p1.name : S.p2.name;
      const editBtn   = document.getElementById(`editStats${playerNum}Btn`);
      const saveBtn   = document.getElementById(`saveStats${playerNum}`);
      const cancelBtn = document.getElementById(`cancelStats${playerNum}`);
      if (editBtn)   editBtn.onclick = () => { S.editingStatsFor = playerNum; renderApp(); };
      if (cancelBtn) cancelBtn.onclick = () => { S.editingStatsFor = null; renderApp(); };
      if (saveBtn) {
        saveBtn.onclick = () => {
          const avg     = parseFloat(document.getElementById(`editAvg${playerNum}`).value)      || 0;
          const chk     = parseFloat(document.getElementById(`editChk${playerNum}`).value)      || 0;
          const matches = parseInt(document.getElementById(`editMatches${playerNum}`).value, 10) || 0;
          const wins    = parseInt(document.getElementById(`editWins${playerNum}`).value, 10)    || 0;
          const notes   = document.getElementById(`editNotes${playerNum}`).value.trim();
          saveLocalPlayerStats(pName, { careerAvg: avg, careerCheckout: chk,
                                        careerMatches: matches, careerMatchWins: wins, notes });
          if (avg > 0) { if (playerNum === 1) S.p1.avg3DA   = avg;  else S.p2.avg3DA   = avg; }
          if (chk > 0) { if (playerNum === 1) S.p1.checkout = chk;  else S.p2.checkout = chk; }
          S.editingStatsFor = null;
          renderApp();
        };
      }
    });
  }

  if (S.screen === 'live') {
    const editBtn = document.getElementById('editSetupBtn');
    if (editBtn) editBtn.onclick = () => { S.screen = 'matchSetup'; renderApp(); };
  }

  if (S.screen === 'complete') {
    const backBtn = document.getElementById('backToListBtn');
    if (backBtn) {
      backBtn.onclick = () => {
        if (S.currentMatch && !S.completedMatches.includes(S.currentMatch.matchNum)) {
          S.completedMatches.push(S.currentMatch.matchNum);
          saveJasonState();
        }
        S.screen        = 'matchList';
        S.currentMatch  = null;
        S.selectedMatchNum = null;
        S.bullWinner    = 0;
        S.bullConfirmed = false;
        S.p1Score       = 0;
        S.p2Score       = 0;
        S.legHistory    = [];
        S.denisLegCount = 0;
        renderApp();
      };
    }
  }
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ INIT ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
(async function init() {
  loadJasonState();
  await loadEventData();
  connectToDenis();  // connect early; applyDenisData() won't act until a match is selected
  renderApp();
})();
</script>
</body>
</html>
