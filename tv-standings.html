<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AADS Darts - Live Standings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aads-orange: #F26522;
            --aads-black: #0D0D0D;
            --card-bg: #141414;
            --row-alt: #1a1a1a;
            --border: #2d2d2d;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --win-green: #4ade80;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--aads-black);
            color: var(--text-main);
            font-family: 'Roboto Condensed', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Section */
        .main-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .aads-logo {
            width: 180px;
            height: auto;
            margin-bottom: 15px;
        }

        .page-title {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--aads-orange);
            letter-spacing: 2px;
            line-height: 1;
        }

        /* Grid Layout */
        .groups-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 1000px) {
            .groups-grid { grid-template-columns: 1fr; }
        }

        /* Card Styling */
        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-header {
            background: linear-gradient(to bottom, #1f1f1f, #141414);
            padding: 15px 20px;
            border-bottom: 2px solid var(--aads-orange);
        }

        .panel-header h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            color: var(--aads-orange);
            letter-spacing: 1px;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        thead {
            background: #000;
        }

        th {
            padding: 12px 10px;
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 1.1rem;
        }

        .col-rank { width: 50px; font-weight: 700; color: var(--text-muted); }
        .col-player { text-align: left; padding-left: 20px; }
        .col-stat { width: 60px; font-family: 'Oswald', sans-serif; font-size: 1.3rem; }
        .col-legs { width: 80px; font-family: 'Oswald', sans-serif; font-size: 1.6rem; color: var(--aads-orange); font-weight: 700; }

        /* Row Highlighting */
        .row-qualify {
            background: rgba(242, 101, 34, 0.03);
        }
        .row-qualify .col-rank { color: var(--aads-orange); }

        .player-info { display: flex; flex-direction: column; }
        .player-name { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; }
        .player-prov { font-size: 0.75rem; color: var(--aads-orange); font-weight: 700; letter-spacing: 1px; }

        .stat-w { color: var(--win-green); }

        /* Recent Results */
        .recent-panel {
            margin-top: 20px;
        }

        .results-list {
            padding: 10px;
            display: grid;
            gap: 10px;
        }

        .match-row {
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            align-items: center;
            background: var(--row-alt);
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid var(--border);
        }

        .match-id { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; }
        .match-vs { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .vs-divider { color: var(--aads-orange); font-size: 0.9rem; }
        .match-score { 
            text-align: right; 
            font-family: 'Oswald', sans-serif; 
            font-size: 1.5rem; 
            color: var(--win-green);
        }

        .no-data {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="main-header">
            <!-- Replacing with local asset name provided in prompt -->
            <img src="AADS OFFIAL LOGO.png" alt="AADS Logo" class="aads-logo" onerror="this.style.display='none'">
            <h1 class="page-title">Group Standings</h1>
        </header>

        <main class="groups-grid" id="groups-container">
            <!-- Groups will be injected here -->
        </main>

        <section class="panel recent-panel" id="recent-results">
            <div class="panel-header">
                <h2>Recent Results</h2>
            </div>
            <div id="results-content">
                <!-- Results will be injected here -->
            </div>
        </section>
    </div>

    <script>
        // Mocking eventData logic as per your previous setup
        let eventData = {
            standingsA: [
                { name: "Drake Berry", province: "NS", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Cory Wallace", province: "NB", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Dana Moss", province: "NB", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Dee Cormier", province: "NB", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Colby Burke", province: "NFLD", matchWins: 0, matchLosses: 0, legsWon: 0 }
            ],
            standingsB: [
                { name: "Wayne Champman", province: "NB", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Jordan Boyd", province: "NS", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Kevin Blanchard", province: "PE", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Don Higgins", province: "NB", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Mark MacEachern", province: "PE", matchWins: 0, matchLosses: 0, legsWon: 0 }
            ],
            recentMatches: []
        };

        async function fetchData() {
            try {
                const response = await fetch(`event-data.json?t=${Date.now()}`);
                if (response.ok) {
                    eventData = await response.json();
                }
            } catch (e) {
                console.log("Using internal data or waiting for file...");
            }
            renderUI();
        }

        function renderUI() {
            renderGroup('A', eventData.standingsA);
            renderGroup('B', eventData.standingsB);
            renderRecent(eventData.recentMatches);
        }

        function renderGroup(id, players) {
            const container = document.getElementById('groups-container');
            if(id === 'A') container.innerHTML = ''; // Clear on first group

            let html = `
                <div class="panel">
                    <div class="panel-header"><h2>Group ${id}</h2></div>
                    <table>
                        <thead>
                            <tr>
                                <th class="col-rank">#</th>
                                <th class="col-player">Player</th>
                                <th class="col-stat">W</th>
                                <th class="col-stat">L</th>
                                <th class="col-legs">Legs</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            if (!players || players.length === 0) {
                html += `<tr><td colspan="5" class="no-data">No Standings Available</td></tr>`;
            } else {
                players.forEach((p, i) => {
                    const isQualifying = i < 4;
                    html += `
                        <tr class="${isQualifying ? 'row-qualify' : ''}">
                            <td class="col-rank">${i + 1}</td>
                            <td class="col-player">
                                <div class="player-info">
                                    <span class="player-name">${p.name}</span>
                                    <span class="player-prov">${p.province || ''}</span>
                                </div>
                            </td>
                            <td class="col-stat stat-w">${p.matchWins}</td>
                            <td class="col-stat">${p.matchLosses}</td>
                            <td class="col-legs">${p.legsWon}</td>
                        </tr>
                    `;
                });
            }

            html += `</tbody></table></div>`;
            container.innerHTML += html;
        }

        function renderRecent(matches) {
            const content = document.getElementById('results-content');
            if (!matches || matches.length === 0) {
                content.innerHTML = `<div class="no-data">No Completed Matches</div>`;
                return;
            }

            let html = `<div class="results-list">`;
            matches.forEach(m => {
                html += `
                    <div class="match-row">
                        <div class="match-id">MATCH #${m.matchNum || '0'}</div>
                        <div class="match-vs">
                            <span>${m.player1}</span>
                            <span class="vs-divider">VS</span>
                            <span>${m.player2}</span>
                        </div>
                        <div class="match-score">${m.score1} - ${m.score2}</div>
                    </div>
                `;
            });
            html += `</div>`;
            content.innerHTML = html;
        }

        // Initialize and poll
        renderUI();
        setInterval(fetchData, 3000);
    </script>
</body>
</html>
