<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AADS Darts - Live Standings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aads-orange: #F26522;
            --aads-black: #0D0D0D;
            --card-bg: #141414;
            --row-alt: #1a1a1a;
            --border: #2d2d2d;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --win-green: #4ade80;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--aads-black);
            color: var(--text-main);
            font-family: 'Roboto Condensed', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 60px;
        }

        /* Header */
        .main-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }

        .aads-logo {
            width: 160px;
            height: auto;
            margin-bottom: 12px;
            display: block;
        }

        .page-title {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--aads-orange);
            letter-spacing: 2px;
            line-height: 1;
        }

        /* Tab Bar */
        .tab-bar {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px;
            gap: 4px;
        }

        .tab-btn {
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            background: none;
            border: none;
            padding: 12px 28px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: color 0.15s;
        }

        .tab-btn:hover { color: var(--text-main); }

        .tab-btn.active {
            color: var(--aads-orange);
            border-bottom-color: var(--aads-orange);
        }

        /* Tab Panels */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Grid Layout */
        .groups-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 1000px) {
            .groups-grid { grid-template-columns: 1fr; }
        }

        /* Card Styling */
        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-header {
            background: linear-gradient(to bottom, #1f1f1f, #141414);
            padding: 15px 20px;
            border-bottom: 2px solid var(--aads-orange);
        }

        .panel-header h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            color: var(--aads-orange);
            letter-spacing: 1px;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        thead { background: #000; }

        th {
            padding: 12px 10px;
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 1.1rem;
        }

        tbody tr:last-child td { border-bottom: none; }

        .col-rank { width: 50px; font-weight: 700; color: var(--text-muted); }
        .col-player { text-align: left; padding-left: 20px; }
        .col-stat { width: 60px; font-family: 'Oswald', sans-serif; font-size: 1.3rem; }
        .col-legs { width: 80px; font-family: 'Oswald', sans-serif; font-size: 1.6rem; color: var(--aads-orange); font-weight: 700; }

        .row-qualify { background: rgba(242, 101, 34, 0.03); }
        .row-qualify .col-rank { color: var(--aads-orange); }

        .player-info { display: flex; flex-direction: column; }
        .player-name { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; }
        .player-prov { font-size: 0.75rem; color: var(--aads-orange); font-weight: 700; letter-spacing: 1px; }
        .stat-w { color: var(--win-green); }

        /* Results Tab */
        .results-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .results-list {
            padding: 12px;
            display: grid;
            gap: 10px;
        }

        .match-row {
            display: grid;
            grid-template-columns: 90px 1fr 60px 60px 1fr 90px;
            align-items: center;
            background: var(--row-alt);
            padding: 16px 20px;
            border-radius: 8px;
            gap: 8px;
        }

        .match-id {
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .match-player {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .match-player.winner { color: var(--win-green); }
        .match-player.loser  { color: var(--text-muted); }
        .match-player.p1     { text-align: right; }
        .match-player.p2     { text-align: left; }

        .match-score-num {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            line-height: 1;
        }

        .match-score-num.winner { color: var(--win-green); }
        .match-score-num.loser  { color: #444; }

        .match-time {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }

        .no-data {
            padding: 50px;
            text-align: center;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Oswald', sans-serif;
        }

        /* Live status bar at bottom */
        #liveStatusBar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 20px;
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: #0d0d0d;
            border-top: 1px solid var(--border);
            transition: border-color 0.4s, color 0.4s;
            z-index: 100;
        }
        #liveStatusBar.connected {
            border-top-color: #4caf50;
            color: #4caf50;
        }
        #liveStatusBar.polling {
            border-top-color: var(--border);
            color: var(--text-muted);
        }
        #liveStatusBar .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }
        #liveStatusBar.connected .status-dot {
            box-shadow: 0 0 6px #4caf50;
            animation: pulse-dot 1.8s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.35; }
        }

    </style>
</head>
<body>
    <div class="container">
        <header class="main-header">
            <img src="AADS OFFIAL LOGO.png" alt="AADS Logo" class="aads-logo" onerror="this.style.display='none'">
            <h1 class="page-title">AADS Darts</h1>
        </header>

        <nav class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('standings')">Group Standings</button>
            <button class="tab-btn" onclick="switchTab('results')">Recent Results</button>
        </nav>

        <!-- Standings Tab -->
        <div class="tab-panel active" id="tab-standings">
            <div class="groups-grid" id="groups-container"></div>
        </div>

        <!-- Results Tab -->
        <div class="tab-panel" id="tab-results">
            <div class="results-panel">
                <div class="panel-header"><h2>Recent Results</h2></div>
                <div id="results-content"></div>
            </div>
        </div>
    </div>

    <!-- Live status bar fixed to bottom -->
    <div id="liveStatusBar" class="polling">
        <span class="status-dot"></span>
        <span id="liveStatusText">Waiting for data…</span>
    </div>

    <script>
        let activeTab = 'standings';

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => {
                if (b.textContent.toLowerCase().includes(tab === 'standings' ? 'standing' : 'result')) {
                    b.classList.add('active');
                }
            });
        }

        let eventData = {
            standingsA: [
                { name: "Drake Berry",    province: "NS",   matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Cory Wallace",   province: "NB",   matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Dana Moss",      province: "NB",   matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Dee Cormier",    province: "NB",   matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Colby Burke",    province: "NFLD", matchWins: 0, matchLosses: 0, legsWon: 0 }
            ],
            standingsB: [
                { name: "Wayne Champman",  province: "NB", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Jordan Boyd",     province: "NS", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Kevin Blanchard", province: "PE", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Don Higgins",     province: "NB", matchWins: 0, matchLosses: 0, legsWon: 0 },
                { name: "Mark MacEachern", province: "PE", matchWins: 0, matchLosses: 0, legsWon: 0 }
            ],
            recentMatches: []
        };

        async function fetchData() {
            try {
                const res = await fetch(`event-data.json?t=${Date.now()}`);
                if (res.ok) {
                    eventData = await res.json();
                    const txt = document.getElementById('liveStatusText');
                    if (txt && !_peerConnected) {
                        const ts = eventData.timestamp ? new Date(eventData.timestamp).toLocaleTimeString() : '';
                        txt.textContent = 'GitHub data' + (ts ? '  ·  Last update: ' + ts : '');
                    }
                }
            } catch (e) {}
            renderUI();
        }

        function renderUI() {
            renderStandings();
            renderRecent(eventData.recentMatches);
        }

        function renderStandings() {
            const container = document.getElementById('groups-container');
            container.innerHTML = '';
            ['A', 'B'].forEach(id => {
                const players = id === 'A' ? eventData.standingsA : eventData.standingsB;
                let html = `
                    <div class="panel">
                        <div class="panel-header"><h2>Group ${id}</h2></div>
                        <table>
                            <thead>
                                <tr>
                                    <th class="col-rank">#</th>
                                    <th class="col-player">Player</th>
                                    <th class="col-stat">W</th>
                                    <th class="col-stat">L</th>
                                    <th class="col-legs">Legs</th>
                                </tr>
                            </thead>
                            <tbody>`;
                if (!players || players.length === 0) {
                    html += `<tr><td colspan="5" class="no-data">No Standings Available</td></tr>`;
                } else {
                    players.forEach((p, i) => {
                        html += `
                            <tr class="${i < 4 ? 'row-qualify' : ''}">
                                <td class="col-rank">${i + 1}</td>
                                <td class="col-player">
                                    <div class="player-info">
                                        <span class="player-name">${p.name}</span>
                                        <span class="player-prov">${p.province || ''}</span>
                                    </div>
                                </td>
                                <td class="col-stat stat-w">${p.matchWins}</td>
                                <td class="col-stat">${p.matchLosses}</td>
                                <td class="col-legs">${p.legsWon}</td>
                            </tr>`;
                    });
                }
                html += `</tbody></table></div>`;
                container.innerHTML += html;
            });
        }

        function renderRecent(matches) {
            const content = document.getElementById('results-content');
            if (!matches || matches.length === 0) {
                content.innerHTML = `<div class="no-data">No Completed Matches Yet</div>`;
                return;
            }
            let html = `<div class="results-list">`;
            [...matches].reverse().forEach(m => {
                const p1wins = m.score1 > m.score2;
                html += `
                    <div class="match-row">
                        <div class="match-id">Match #${m.matchNum || '—'}</div>
                        <div class="match-player p1 ${p1wins ? 'winner' : 'loser'}">${m.player1}</div>
                        <div class="match-score-num ${p1wins ? 'winner' : 'loser'}">${m.score1}</div>
                        <div class="match-score-num ${!p1wins ? 'winner' : 'loser'}">${m.score2}</div>
                        <div class="match-player p2 ${!p1wins ? 'winner' : 'loser'}">${m.player2}</div>
                        <div class="match-time">${m.time || ''}</div>
                    </div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
        }

        // -------------------------------------------------------
        // PAIRING CODE CONNECTION (no GitHub token needed)
        // -------------------------------------------------------
        const ADMIN_PEER_CODE = 'AADS40'; // Fixed code — interview app always hosts here
        let _peerConnected = false;
        let _pollingInterval = null;
        let _peerObj = null;

        function _startPolling() {
            if (_pollingInterval) return;
            fetchData();
            _pollingInterval = setInterval(fetchData, 3000);
        }

        function _stopPolling() {
            if (_pollingInterval) { clearInterval(_pollingInterval); _pollingInterval = null; }
        }

        function _peerConnect(code) {
            const cleanCode = code.trim().toUpperCase();
            const hostId    = 'darts-' + cleanCode;
            const viewerId  = 'viewer-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

            if (_peerObj && !_peerObj.destroyed) _peerObj.destroy();

            const peer = new Peer(viewerId, { debug: 0 });
            _peerObj = peer;

            peer.on('open', () => {
                const conn = peer.connect(hostId, { reliable: true, serialization: 'json' });

                const timeout = setTimeout(() => {
                    if (!_peerConnected) {
                        const ps = document.getElementById('pairStatus');
                        if (ps) { ps.style.color='#e53935'; ps.textContent='Host not found — check the code.'; }
                        _startPolling();
                    }
                }, 8000);

                conn.on('open', () => {
                    clearTimeout(timeout);
                    _peerConnected = true;
                    localStorage.setItem('dartsViewerCode', cleanCode);
                    _hidePairOverlay();
                    _stopPolling();
                    // Update bottom status bar
                    const bar = document.getElementById('liveStatusBar');
                    const txt = document.getElementById('liveStatusText');
                    if (bar) { bar.className = 'connected'; }
                    if (txt) { txt.textContent = '\u25cf Live \u2014 Paired to Interview App  |  Code: ' + cleanCode; }
                });

                conn.on('data', (data) => {
                    // Handle reset broadcast from admin app
                    if (data && data.type === 'reset') {
                        eventData = {
                            standingsA: eventData.standingsA.map(p => ({...p, matchWins:0, matchLosses:0, legsWon:0})),
                            standingsB: eventData.standingsB.map(p => ({...p, matchWins:0, matchLosses:0, legsWon:0})),
                            recentMatches: []
                        };
                        renderUI();
                        return;
                    }
                    eventData = data;
                    renderUI();
                });

                conn.on('close', () => {
                    _peerConnected = false;
                    const bar = document.getElementById('liveStatusBar');
                    const txt = document.getElementById('liveStatusText');
                    if (bar) bar.className = 'polling';
                    if (txt) txt.textContent = 'Disconnected \u2014 reconnecting\u2026';
                    _startPolling();
                    // Auto-reconnect to admin app after a short delay
                    setTimeout(() => { if (!_peerConnected) _peerConnect(ADMIN_PEER_CODE); }, 5000);
                });

                conn.on('error', () => {
                    _peerConnected = false;
                    const bar = document.getElementById('liveStatusBar');
                    const txt = document.getElementById('liveStatusText');
                    if (bar) bar.className = 'polling';
                    if (txt) txt.textContent = 'Connection error \u2014 using GitHub data.';
                    _startPolling();
                });
            });

            peer.on('error', () => {
                _peerConnected = false;
                const ps = document.getElementById('pairStatus');
                if (ps) { ps.style.color='#e53935'; ps.textContent='Could not connect — check code.'; }
                _startPolling();
            });
        }

        function _showPairOverlay() {
            let ov = document.getElementById('pairOverlay');
            if (ov) { ov.style.display='flex'; setTimeout(()=>document.getElementById('pairInput')?.focus(),80); return; }

            ov = document.createElement('div');
            ov.id = 'pairOverlay';
            ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1.5rem;';
            ov.innerHTML = `
              <div style="background:#111;border:2px solid var(--aads-orange);border-radius:22px;padding:2.2em 2em;max-width:440px;width:100%;text-align:center;">
                <div style="font-family:'Oswald',sans-serif;font-size:0.75em;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.3em;">AADS Darts</div>
                <h2 style="font-family:'Oswald',sans-serif;font-size:2em;font-weight:900;letter-spacing:0.05em;text-transform:uppercase;color:#fff;margin-bottom:0.1em;">Live Standings</h2>
                <div style="width:50px;height:3px;background:var(--aads-orange);border-radius:2px;margin:0.5em auto 1.4em;"></div>
                <p style="font-size:0.9em;color:var(--text-muted);margin-bottom:1.4em;line-height:1.7;">
                  Enter the <b style="color:#fff;">6-character pairing code</b><br>shown in the interview app.
                </p>
                <input id="pairInput" type="text" maxlength="6" placeholder="AB3X7Q"
                  style="width:100%;background:#1a1a1a;border:2px solid var(--aads-orange);color:#fff;padding:0.75em;border-radius:12px;font-size:2em;font-family:monospace;font-weight:900;letter-spacing:0.3em;text-align:center;text-transform:uppercase;outline:none;margin-bottom:0.9em;"
                />
                <button id="pairConnectBtn"
                  style="width:100%;background:var(--aads-orange);color:#000;border:none;border-radius:12px;padding:0.85em;font-family:'Oswald',sans-serif;font-size:1.1em;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-bottom:0.7em;">
                  Connect
                </button>
                <div id="pairStatus" style="font-size:0.82em;color:var(--text-muted);min-height:1.3em;margin-bottom:0.8em;"></div>
                <button id="pairGithubBtn"
                  style="background:none;border:none;color:var(--text-muted);font-size:0.8em;cursor:pointer;text-decoration:underline;">
                  Use GitHub data instead
                </button>
              </div>`;

            document.body.appendChild(ov);

            const input = ov.querySelector('#pairInput');
            setTimeout(() => input?.focus(), 80);
            input.addEventListener('input',  () => { input.value = input.value.toUpperCase(); });
            input.addEventListener('keydown', e => { if (e.key === 'Enter') _doPairConnect(); });
            ov.querySelector('#pairConnectBtn').addEventListener('click', _doPairConnect);
            ov.querySelector('#pairGithubBtn').addEventListener('click', () => {
                _hidePairOverlay(); _startPolling();
            });
        }

        function _hidePairOverlay() {
            const ov = document.getElementById('pairOverlay');
            if (ov) ov.style.display = 'none';
        }

        function _doPairConnect() {
            const code = (document.getElementById('pairInput')?.value || '').trim().toUpperCase();
            const ps = document.getElementById('pairStatus');
            if (code.length < 4) {
                if (ps) { ps.style.color='#e53935'; ps.textContent='Enter the 6-character code from the interview app.'; }
                return;
            }
            if (ps) { ps.style.color='var(--text-muted)'; ps.textContent='Connecting…'; }
            _peerConnect(code);
        }

        // Fixed admin code is now at script level; just start polling + attempt peer connect
        window.addEventListener('load', () => {
            const bar = document.getElementById('liveStatusBar');
            const txt = document.getElementById('liveStatusText');

            // Start GitHub polling right away — no blocking overlay
            _startPolling();
            if (txt) txt.textContent = 'Loading standings\u2026';

            // Silently attempt live connection to admin app
            _peerConnect(ADMIN_PEER_CODE);
            setTimeout(() => {
                if (!_peerConnected) {
                    if (bar) bar.className = 'polling';
                    if (txt) txt.textContent = 'Live from GitHub data';
                }
            }, 9000);
        });
    </script>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</body>
</html>
