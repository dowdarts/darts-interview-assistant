<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AADS Darts - TV Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #F26522;
      --orange-glow: #FF7A2F;
      --deep-black: #0D0D0D;
      --card-black: #171717;
      --divider: #2A2A2A;
      --white: #FFFFFF;
      --text-muted: #A0A0A0;
      --font-main: 'Inter', sans-serif;
      --font-display: 'Barlow Condensed', sans-serif;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--deep-black);
      color: var(--white);
      font-family: var(--font-main);
      overflow: hidden;
      padding: 2em;
    }
    
    .screen {
      max-width: 1600px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    .header {
      text-align: center;
      margin-bottom: 2em;
    }
    
    .logo {
      font-family: var(--font-display);
      font-size: 0.9em;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5em;
    }
    
    .title {
      font-family: var(--font-display);
      font-size: 3.5em;
      font-weight: 900;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, var(--orange), var(--orange-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .current-match {
      background: var(--card-black);
      border: 2px solid var(--divider);
      border-left: 6px solid var(--orange);
      border-radius: 20px;
      padding: 2.5em;
      margin-bottom: 2em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    
    .match-label {
      font-family: var(--font-display);
      font-size: 1.1em;
      letter-spacing: 0.12em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 1.5em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .live-badge {
      background: var(--orange);
      color: #000;
      padding: 0.3em 0.9em;
      border-radius: 20px;
      font-weight: 900;
      font-size: 0.9em;
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
    }
    
    .live-dot {
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .players {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 2em;
      align-items: center;
    }
    
    .player {
      text-align: center;
    }
    
    .player-name {
      font-family: var(--font-display);
      font-size: 2.8em;
      font-weight: 900;
      letter-spacing: 0.02em;
      margin-bottom: 0.2em;
    }
    
    .player-province {
      font-size: 1.1em;
      color: var(--orange);
      font-weight: 600;
    }
    
    .vs {
      font-family: var(--font-display);
      font-size: 2em;
      color: var(--text-muted);
      font-weight: 700;
    }
    
    .match-details {
      margin-top: 1.5em;
      padding-top: 1.5em;
      border-top: 1px solid var(--divider);
      display: flex;
      justify-content: center;
      gap: 3em;
      font-size: 1.1em;
    }
    
    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.6em;
      color: var(--text-muted);
    }
    
    .detail-label {
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.85em;
    }
    
    .detail-value {
      color: var(--white);
      font-weight: 700;
    }
    
    .schedule {
      background: var(--card-black);
      border: 2px solid var(--divider);
      border-radius: 20px;
      padding: 2.5em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    
    .schedule-header {
      font-family: var(--font-display);
      font-size: 1.3em;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.5em;
      text-align: center;
    }
    
    .schedule-grid {
      display: grid;
      gap: 1em;
    }
    
    .schedule-row {
      display: grid;
      grid-template-columns: 1fr 3fr 0.8fr 3em;
      gap: 1.5em;
      align-items: center;
      padding: 1.2em 1.5em;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--divider);
      border-radius: 12px;
      transition: background 0.2s;
    }
    
    .schedule-row:hover {
      background: rgba(255,255,255,0.04);
    }
    
    .schedule-time {
      font-family: var(--font-display);
      font-size: 1.3em;
      font-weight: 700;
      color: var(--orange);
    }
    
    .schedule-players {
      font-family: var(--font-display);
      font-size: 1.1em;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.8em;
    }
    
    .schedule-vs {
      color: var(--text-muted);
      font-size: 0.9em;
    }
    
    .schedule-board {
      font-family: var(--font-display);
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-align: center;
    }
    
    .schedule-board.board-1 {
      color: var(--orange);
      font-weight: 700;
    }
    
    .schedule-arrow {
      color: var(--text-muted);
      font-size: 1.5em;
    }
    
    .no-data {
      text-align: center;
      padding: 4em 2em;
      color: var(--text-muted);
    }
    
    .no-data-icon {
      font-size: 4em;
      margin-bottom: 0.5em;
    }
    
    .no-data-text {
      font-family: var(--font-display);
      font-size: 1.5em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    
    .footer {
      margin-top: 2em;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9em;
    }

    /* --- Live pair layout --- */
    .live-layout {
      display: flex;
      flex-direction: column;
      gap: 1.5em;
    }

    .live-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5em;
      align-items: stretch;
    }

    .live-section .current-match {
      margin-bottom: 0;
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .live-primary {
      border-left: 6px solid var(--orange);
    }

    .sim-match {
      border-left: 6px solid #555;
    }

    .sim-badge {
      background: #2a2a2a;
      color: var(--text-muted);
      padding: 0.3em 0.9em;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8em;
      font-family: var(--font-display);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .player-name-small {
      font-family: var(--font-display);
      font-size: 1.9em;
      font-weight: 900;
      letter-spacing: 0.02em;
      margin-bottom: 0.2em;
    }

    .vs-small {
      font-family: var(--font-display);
      font-size: 1.4em;
      color: var(--text-muted);
      font-weight: 700;
    }

    /* --- Up Next section --- */
    .up-next-section {
      background: var(--card-black);
      border: 2px solid var(--divider);
      border-radius: 20px;
      padding: 2em 2.5em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .up-next-header {
      font-family: var(--font-display);
      font-size: 1.1em;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.2em;
      text-align: center;
    }

    .up-next-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2em;
    }

    .up-next-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--divider);
      border-radius: 14px;
      padding: 1.2em 1.5em;
    }

    .board1-next {
      border-left: 4px solid var(--orange);
    }

    .board2-next {
      border-left: 4px solid #444;
    }

    .up-next-match-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8em;
      font-family: var(--font-display);
      font-size: 0.9em;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .up-next-board-badge {
      background: var(--orange);
      color: #000;
      padding: 0.2em 0.7em;
      border-radius: 20px;
      font-weight: 900;
      font-size: 0.85em;
    }

    .board2-badge {
      background: #2a2a2a;
      color: var(--text-muted);
    }

    .up-next-players {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1em;
    }

    .up-next-player {
      text-align: center;
      flex: 1;
    }

    .up-next-name {
      font-family: var(--font-display);
      font-size: 1.6em;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .up-next-province {
      font-size: 0.9em;
      color: var(--orange);
      font-weight: 600;
    }

    .up-next-vs {
      font-family: var(--font-display);
      font-size: 1.2em;
      color: var(--text-muted);
      font-weight: 700;
    }

    .up-next-time {
      margin-top: 0.8em;
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.9em;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    /* --- Pre-event pair schedule --- */
    .pair-grid {
      display: flex;
      flex-direction: column;
      gap: 0.8em;
    }

    .pair-row {
      display: grid;
      grid-template-columns: 5em 1fr auto 1fr;
      gap: 1.2em;
      align-items: center;
      padding: 1em 1.4em;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--divider);
      border-radius: 12px;
    }

    .pair-time {
      font-family: var(--font-display);
      font-size: 1.1em;
      font-weight: 700;
      color: var(--orange);
    }

    .pair-match {
      display: flex;
      flex-direction: column;
      gap: 0.3em;
    }

    .board-badge {
      display: inline-block;
      background: #2a2a2a;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 0.7em;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2em 0.6em;
      border-radius: 20px;
      margin-bottom: 0.2em;
      width: fit-content;
    }

    .live-board {
      background: var(--orange);
      color: #000;
    }

    .pair-names {
      font-family: var(--font-display);
      font-size: 1.05em;
      font-weight: 600;
    }

    .pair-vs {
      color: var(--text-muted);
      font-size: 0.85em;
    }

    .pair-provinces {
      font-size: 0.8em;
      color: var(--text-muted);
    }

    .pair-divider {
      font-family: var(--font-display);
      font-size: 1.5em;
      color: var(--divider);
      font-weight: 900;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="screen" id="app">
    <div class="header">
      <div class="logo">AADS Darts</div>
      <div class="title">Live Event Display</div>
    </div>
    <div id="content"></div>
    <div class="footer" id="status">Connecting...</div>
  </div>

  <script>
    let eventData = null;
    let currentView = 'current'; // 'current' or 'schedule'

    // Normalize data so the TV display works with both old and new event-data.json formats
    function normalizeEventData(data) {
      // --- eventStarted ---
      if (data.eventStarted === undefined) {
        data.eventStarted = !!(data.recentMatches && data.recentMatches.length > 0);
      }

      // Build a sorted combined match list from recentMatches + upcomingMatches
      const allMatchesSorted = [];
      (data.recentMatches || []).forEach(m => allMatchesSorted.push({ ...m, completed: true }));
      (data.upcomingMatches || []).forEach(m => allMatchesSorted.push({ ...m, completed: false }));
      allMatchesSorted.sort((a, b) => a.matchNum - b.matchNum);

      // --- allPairs (for pre-event full schedule) ---
      if (!data.allPairs || data.allPairs.length === 0) {
        data.allPairs = [];
        for (let i = 0; i < allMatchesSorted.length; i += 2) {
          data.allPairs.push({
            board1: allMatchesSorted[i]   || null,
            board2: allMatchesSorted[i+1] || null
          });
        }
      }

      // --- currentPair + nextPair (for live display) ---
      if (!data.currentPair) {
        const upcoming = allMatchesSorted.filter(m => !m.completed);
        const liveMatch = upcoming.find(m => m.board === 1) || upcoming[0] || null;
        if (liveMatch) {
          const sim = upcoming.find(m => m.matchNum === liveMatch.matchNum + 1) || null;
          data.currentPair = { liveMatch, simultaneousMatch: sim };

          const nextBoard1 = upcoming.find(m => m.board === 1 && m.matchNum > liveMatch.matchNum);
          if (nextBoard1) {
            const nextBoard2 = upcoming.find(m => m.matchNum === nextBoard1.matchNum + 1) || null;
            data.nextPair = { board1Match: nextBoard1, board2Match: nextBoard2 };
          }
        }
      }

      return data;
    }

    async function fetchData() {
      try {
        const cacheBuster = Date.now();
        const response = await fetch(`event-data.json?t=${cacheBuster}`);
        if (response.ok) {
          eventData = normalizeEventData(await response.json());
          updateDisplay();
          document.getElementById('status').textContent =
            `Last updated: ${new Date(eventData.timestamp || Date.now()).toLocaleTimeString()}`;
        }
      } catch (error) {
        console.error('Fetch error:', error);
        document.getElementById('status').textContent = 'Waiting for data...';
      }
    }

    function updateDisplay() {
      if (!eventData) return;
      // Pre-event: show full pair schedule until any result is entered
      if (!eventData.eventStarted) {
        renderPreEventSchedule();
        return;
      }
      if (currentView === 'current') {
        renderLiveDisplay();
      } else {
        renderUpcomingSchedule();
      }
    }

    // -------------------------------------------------------
    // PRE-EVENT: full pair schedule (all 10 pairs)
    // -------------------------------------------------------
    function renderPreEventSchedule() {
      const content = document.getElementById('content');
      const pairs = eventData.allPairs || [];

      if (pairs.length === 0) {
        content.innerHTML = `<div class="no-data"><div class="no-data-icon">🏆</div><div class="no-data-text">Loading Schedule...</div></div>`;
        return;
      }

      const rows = pairs.map(p => {
        const b1 = p.board1;
        const b2 = p.board2;
        return `
          <div class="pair-row">
            <div class="pair-time">${b1 ? b1.time : ''}</div>
            <div class="pair-match">
              <span class="board-badge live-board">● Board 1 – Live</span>
              <div class="pair-names">
                ${b1 ? `${b1.player1} <span class="pair-vs">vs</span> ${b1.player2}` : '—'}
              </div>
              ${b1 && (b1.player1Province || b1.player2Province)
                ? `<div class="pair-provinces">${b1.player1Province || ''} · ${b1.player2Province || ''}</div>` : ''}
            </div>
            <div class="pair-divider">+</div>
            <div class="pair-match">
              <span class="board-badge">Board 2</span>
              <div class="pair-names">
                ${b2 ? `${b2.player1} <span class="pair-vs">vs</span> ${b2.player2}` : '—'}
              </div>
              ${b2 && (b2.player1Province || b2.player2Province)
                ? `<div class="pair-provinces">${b2.player1Province || ''} · ${b2.player2Province || ''}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      content.innerHTML = `
        <div class="schedule">
          <div class="schedule-header">Match Schedule</div>
          <div class="pair-grid">${rows}</div>
        </div>`;
    }

    // -------------------------------------------------------
    // LIVE DISPLAY: current pair (Board 1 LIVE + Board 2) + Up Next
    // -------------------------------------------------------
    function renderLiveDisplay() {
      const content = document.getElementById('content');
      const pair   = eventData.currentPair;
      const next   = eventData.nextPair;

      if (!pair || !pair.liveMatch) {
        content.innerHTML = `<div class="no-data"><div class="no-data-icon">🏆</div><div class="no-data-text">Event Complete</div></div>`;
        return;
      }

      const live = pair.liveMatch;
      const sim  = pair.simultaneousMatch;

      // ---- Current pair section ----
      let liveCard = `
        <div class="current-match live-primary">
          <div class="match-label">
            <span>Match ${live.matchNum}</span>
            <span class="live-badge"><span class="live-dot"></span> LIVE – BOARD 1</span>
          </div>
          <div class="players">
            <div class="player">
              <div class="player-name">${live.player1}</div>
              ${live.player1Province ? `<div class="player-province">${live.player1Province}</div>` : ''}
            </div>
            <div class="vs">VS</div>
            <div class="player">
              <div class="player-name">${live.player2}</div>
              ${live.player2Province ? `<div class="player-province">${live.player2Province}</div>` : ''}
            </div>
          </div>
          <div class="match-details">
            <div class="detail-item"><span class="detail-label">Time:</span><span class="detail-value">${live.time || 'Now'}</span></div>
            <div class="detail-item"><span class="detail-label">Board:</span><span class="detail-value">Board 1 (Live Stream)</span></div>
          </div>
        </div>`;

      let simCard = '';
      if (sim) {
        simCard = `
          <div class="current-match sim-match">
            <div class="match-label">
              <span>Match ${sim.matchNum}</span>
              <span class="sim-badge">Also Playing – Board 2</span>
            </div>
            <div class="players">
              <div class="player">
                <div class="player-name">${sim.player1}</div>
                ${sim.player1Province ? `<div class="player-province">${sim.player1Province}</div>` : ''}
              </div>
              <div class="vs">VS</div>
              <div class="player">
                <div class="player-name">${sim.player2}</div>
                ${sim.player2Province ? `<div class="player-province">${sim.player2Province}</div>` : ''}
              </div>
            </div>
            <div class="match-details">
              <div class="detail-item"><span class="detail-label">Time:</span><span class="detail-value">${sim.time || 'Now'}</span></div>
            </div>
          </div>`;
      }

      // ---- Up Next section ----
      let upNextHtml = '';
      if (next) {
        const b1 = next.board1Match;
        const b2 = next.board2Match;

        const makeNextCard = (m, isBoard1) => !m ? '' : `
          <div class="up-next-card ${isBoard1 ? 'board1-next' : 'board2-next'}">
            <div class="up-next-match-label">
              <span>Match ${m.matchNum}</span>
              <span class="up-next-board-badge ${isBoard1 ? '' : 'board2-badge'}">${isBoard1 ? '● Board 1' : 'Board 2'}</span>
            </div>
            <div class="up-next-players">
              <div class="up-next-player">
                <div class="up-next-name">${m.player1}</div>
                ${m.player1Province ? `<div class="up-next-province">${m.player1Province}</div>` : ''}
              </div>
              <div class="up-next-vs">VS</div>
              <div class="up-next-player">
                <div class="up-next-name">${m.player2}</div>
                ${m.player2Province ? `<div class="up-next-province">${m.player2Province}</div>` : ''}
              </div>
            </div>
            <div class="up-next-time">${m.time || ''}</div>
          </div>`;

        upNextHtml = `
          <div class="up-next-section">
            <div class="up-next-header">Up Next</div>
            <div class="up-next-grid">
              ${makeNextCard(b1, true)}
              ${makeNextCard(b2, false)}
            </div>
          </div>`;
      }

      content.innerHTML = `
        <div class="live-layout">
          <div class="live-section">${liveCard}${simCard}</div>
          ${upNextHtml}
        </div>`;
    }

    // -------------------------------------------------------
    // SCHEDULE VIEW: rotate view showing upcoming matches
    // -------------------------------------------------------
    function renderUpcomingSchedule() {
      const content = document.getElementById('content');
      const matches = eventData.upcomingMatches || [];

      if (matches.length === 0) {
        content.innerHTML = `<div class="no-data"><div class="no-data-icon">✓</div><div class="no-data-text">All Matches Complete</div></div>`;
        return;
      }

      const rows = matches.slice(0, 8).map(m => `
        <div class="schedule-row">
          <div class="schedule-time">${m.time || 'TBD'}</div>
          <div class="schedule-players">
            <span>${m.player1}</span>
            <span class="schedule-vs">vs</span>
            <span>${m.player2}</span>
          </div>
          <div class="schedule-board ${m.board === 1 ? 'board-1' : ''}">
            ${m.board === 1 ? '● Board 1' : 'Board 2'}
          </div>
          <div class="schedule-arrow">›</div>
        </div>`).join('');

      content.innerHTML = `
        <div class="schedule">
          <div class="schedule-header">Upcoming Matches</div>
          <div class="schedule-grid">${rows}</div>
        </div>`;
    }

    function rotateView() {
      if (!eventData || !eventData.eventStarted) return; // no rotation pre-event
      currentView = currentView === 'current' ? 'schedule' : 'current';
      updateDisplay();
    }

    // Fetch data every 3 seconds
    setInterval(fetchData, 3000);
    fetchData();

    // Rotate between live + upcoming schedule every 20 seconds
    setInterval(rotateView, 20000);
  </script>
</body>
</html>
