<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AADS Darts - TV Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    :root {
      --orange: #F26522;
      --orange-glow: #FF7A2F;
      --deep-black: #0D0D0D;
      --card-black: #171717;
      --divider: #2A2A2A;
      --white: #FFFFFF;
      --text-muted: #A0A0A0;
      --font-main: 'Inter', sans-serif;
      --font-display: 'Barlow Condensed', sans-serif;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--deep-black);
      color: var(--white);
      font-family: var(--font-main);
      overflow: hidden;
      padding: 2em;
    }
    
    .screen {
      max-width: 1600px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    .header {
      text-align: center;
      margin-bottom: 2em;
    }
    
    .logo {
      font-family: var(--font-display);
      font-size: 0.9em;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5em;
    }
    
    .title {
      font-family: var(--font-display);
      font-size: 3.5em;
      font-weight: 900;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, var(--orange), var(--orange-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .current-match {
      background: var(--card-black);
      border: 2px solid var(--divider);
      border-left: 6px solid var(--orange);
      border-radius: 20px;
      padding: 2.5em;
      margin-bottom: 2em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    
    .match-label {
      font-family: var(--font-display);
      font-size: 1.1em;
      letter-spacing: 0.12em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 1.5em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .live-badge {
      background: var(--orange);
      color: #000;
      padding: 0.3em 0.9em;
      border-radius: 20px;
      font-weight: 900;
      font-size: 0.9em;
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
    }
    
    .live-dot {
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .players {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 2em;
      align-items: center;
    }
    
    .player {
      text-align: center;
    }
    
    .player-name {
      font-family: var(--font-display);
      font-size: 2.8em;
      font-weight: 900;
      letter-spacing: 0.02em;
      margin-bottom: 0.2em;
    }
    
    .player-province {
      font-size: 1.1em;
      color: var(--orange);
      font-weight: 600;
    }
    
    .vs {
      font-family: var(--font-display);
      font-size: 2em;
      color: var(--text-muted);
      font-weight: 700;
    }
    
    .match-details {
      margin-top: 1.5em;
      padding-top: 1.5em;
      border-top: 1px solid var(--divider);
      display: flex;
      justify-content: center;
      gap: 3em;
      font-size: 1.1em;
    }
    
    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.6em;
      color: var(--text-muted);
    }
    
    .detail-label {
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.85em;
    }
    
    .detail-value {
      color: var(--white);
      font-weight: 700;
    }
    
    .schedule {
      background: var(--card-black);
      border: 2px solid var(--divider);
      border-radius: 20px;
      padding: 2.5em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    
    .schedule-header {
      font-family: var(--font-display);
      font-size: 1.3em;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.5em;
      text-align: center;
    }
    
    .schedule-grid {
      display: grid;
      gap: 1em;
    }
    
    .schedule-row {
      display: grid;
      grid-template-columns: 1fr 3fr 0.8fr 3em;
      gap: 1.5em;
      align-items: center;
      padding: 1.2em 1.5em;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--divider);
      border-radius: 12px;
      transition: background 0.2s;
    }
    
    .schedule-row:hover {
      background: rgba(255,255,255,0.04);
    }
    
    .schedule-time {
      font-family: var(--font-display);
      font-size: 1.3em;
      font-weight: 700;
      color: var(--orange);
    }
    
    .schedule-players {
      font-family: var(--font-display);
      font-size: 1.1em;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.8em;
    }
    
    .schedule-vs {
      color: var(--text-muted);
      font-size: 0.9em;
    }
    
    .schedule-board {
      font-family: var(--font-display);
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-align: center;
    }
    
    .schedule-board.board-1 {
      color: var(--orange);
      font-weight: 700;
    }
    
    .schedule-arrow {
      color: var(--text-muted);
      font-size: 1.5em;
    }
    
    .no-data {
      text-align: center;
      padding: 4em 2em;
      color: var(--text-muted);
    }
    
    .no-data-icon {
      font-size: 4em;
      margin-bottom: 0.5em;
    }
    
    .no-data-text {
      font-family: var(--font-display);
      font-size: 1.5em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    
    .footer {
      margin-top: 1.5em;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9em;
    }

    /* View indicator pills */
    .view-indicator {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.6em;
      margin-bottom: 1.2em;
    }
    .view-pill {
      font-family: var(--font-display);
      font-size: 0.8em;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25em 0.9em;
      border-radius: 20px;
      border: 1px solid var(--divider);
      color: var(--text-muted);
      background: transparent;
      transition: all 0.3s;
    }
    .view-pill.active {
      background: var(--orange);
      color: #000;
      border-color: var(--orange);
      font-weight: 900;
    }

    /* Fade transition on content */
    #content {
      animation: fadeIn 0.4s ease;
    }

    /* Standings */
    .standings-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5em;
    }
    .standings-card {
      background: var(--card-black);
      border: 2px solid var(--divider);
      border-radius: 20px;
      padding: 2em 2.5em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .standings-title {
      font-family: var(--font-display);
      font-size: 1.3em;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 1.2em;
      text-align: center;
    }
    .standings-table {
      width: 100%;
      border-collapse: collapse;
    }
    .standings-table th {
      font-family: var(--font-display);
      font-size: 0.8em;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0.4em 0.6em;
      text-align: center;
      border-bottom: 1px solid var(--divider);
    }
    .standings-table th:first-child { text-align: left; }
    .standings-table td {
      padding: 0.7em 0.6em;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 1.05em;
    }
    .standings-table td:first-child {
      text-align: left;
      font-family: var(--font-display);
      font-size: 1.15em;
      font-weight: 700;
    }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table tr:first-child td { padding-top: 1em; }
    .standings-rank {
      color: var(--text-muted);
      font-size: 0.85em;
      font-weight: 400;
      margin-right: 0.5em;
    }
    .standings-province {
      font-size: 0.8em;
      color: var(--orange);
      font-weight: 600;
      margin-left: 0.4em;
    }
    .standings-wins  { color: #4caf50; font-weight: 700; }
    .standings-losses { color: var(--text-muted); }

    /* --- Live pair layout --- */
    .live-layout {
      display: flex;
      flex-direction: column;
      gap: 1.5em;
    }

    .live-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5em;
      align-items: stretch;
    }

    .live-section .current-match {
      margin-bottom: 0;
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .live-primary {
      border-left: 6px solid var(--orange);
    }

    .sim-match {
      border-left: 6px solid #555;
    }

    .sim-badge {
      background: #2a2a2a;
      color: var(--text-muted);
      padding: 0.3em 0.9em;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8em;
      font-family: var(--font-display);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .player-name-small {
      font-family: var(--font-display);
      font-size: 1.9em;
      font-weight: 900;
      letter-spacing: 0.02em;
      margin-bottom: 0.2em;
    }

    .vs-small {
      font-family: var(--font-display);
      font-size: 1.4em;
      color: var(--text-muted);
      font-weight: 700;
    }

    /* --- Up Next section --- */
    .up-next-section {
      background: var(--card-black);
      border: 2px solid var(--divider);
      border-radius: 20px;
      padding: 2em 2.5em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .up-next-header {
      font-family: var(--font-display);
      font-size: 1.1em;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.2em;
      text-align: center;
    }

    .up-next-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2em;
    }

    .up-next-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--divider);
      border-radius: 14px;
      padding: 1.2em 1.5em;
    }

    .board1-next {
      border-left: 4px solid var(--orange);
    }

    .board2-next {
      border-left: 4px solid #444;
    }

    .up-next-match-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8em;
      font-family: var(--font-display);
      font-size: 0.9em;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .up-next-board-badge {
      background: var(--orange);
      color: #000;
      padding: 0.2em 0.7em;
      border-radius: 20px;
      font-weight: 900;
      font-size: 0.85em;
    }

    .board2-badge {
      background: #2a2a2a;
      color: var(--text-muted);
    }

    .up-next-players {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1em;
    }

    .up-next-player {
      text-align: center;
      flex: 1;
    }

    .up-next-name {
      font-family: var(--font-display);
      font-size: 1.6em;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .up-next-province {
      font-size: 0.9em;
      color: var(--orange);
      font-weight: 600;
    }

    .up-next-vs {
      font-family: var(--font-display);
      font-size: 1.2em;
      color: var(--text-muted);
      font-weight: 700;
    }

    .up-next-time {
      margin-top: 0.8em;
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.9em;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    /* --- Airport-style UP NEXT ticker --- */
    .ticker-bar {
      background: var(--card-black);
      border: 2px solid var(--divider);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .ticker-header {
      background: var(--orange);
      color: #000;
      font-family: var(--font-display);
      font-size: 1.05em;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.45em 1.5em;
      display: flex;
      align-items: center;
      gap: 0.6em;
    }
    .ticker-header-dot {
      width: 10px;
      height: 10px;
      background: #000;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    .ticker-scroll-wrap {
      height: 7.2em;
      overflow: hidden;
      position: relative;
    }
    .ticker-inner {
      display: flex;
      flex-direction: column;
      animation: tickerScroll linear infinite;
    }
    @keyframes tickerScroll {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    .ticker-row {
      display: grid;
      grid-template-columns: 5.5em 1fr 2em 1fr;
      gap: 1em;
      align-items: center;
      padding: 0.9em 1.5em;
      border-bottom: 1px solid var(--divider);
      min-height: 3.6em;
    }
    .ticker-row:last-child { border-bottom: none; }
    .ticker-time {
      font-family: var(--font-display);
      font-size: 1.1em;
      font-weight: 700;
      color: var(--orange);
      white-space: nowrap;
    }
    .ticker-match {
      display: flex;
      flex-direction: column;
      gap: 0.15em;
    }
    .ticker-names {
      font-family: var(--font-display);
      font-size: 1.05em;
      font-weight: 600;
    }
    .ticker-sep {
      font-family: var(--font-display);
      font-size: 1.4em;
      color: #444;
      font-weight: 900;
      text-align: center;
    }

    /* --- Pre-event pair schedule --- */
    .pair-grid {
      display: flex;
      flex-direction: column;
      gap: 0.8em;
    }

    .pair-row {
      display: grid;
      grid-template-columns: 5em 1fr auto 1fr;
      gap: 1.2em;
      align-items: center;
      padding: 1em 1.4em;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--divider);
      border-radius: 12px;
    }

    .pair-time {
      font-family: var(--font-display);
      font-size: 1.1em;
      font-weight: 700;
      color: var(--orange);
    }

    .pair-match {
      display: flex;
      flex-direction: column;
      gap: 0.3em;
    }

    .board-badge {
      display: inline-block;
      background: #2a2a2a;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 0.7em;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2em 0.6em;
      border-radius: 20px;
      margin-bottom: 0.2em;
      width: fit-content;
    }

    .live-board {
      background: var(--orange);
      color: #000;
    }

    .pair-names {
      font-family: var(--font-display);
      font-size: 1.05em;
      font-weight: 600;
    }

    .pair-vs {
      color: var(--text-muted);
      font-size: 0.85em;
    }

    .pair-provinces {
      font-size: 0.8em;
      color: var(--text-muted);
    }

    .pair-divider {
      font-family: var(--font-display);
      font-size: 1.5em;
      color: var(--divider);
      font-weight: 900;
      text-align: center;
    }

    /* ---- Closed-caption announcement overlay ---- */
    #cc-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 999999;
      padding: 0.6em 2em 1.8em;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 70%, transparent);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #cc-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.8em, 4vw, 3.2em);
      font-weight: 700;
      color: #fff;
      text-align: center;
      line-height: 1.3;
      letter-spacing: 0.03em;
      background: rgba(0,0,0,0.75);
      padding: 0.3em 0.8em;
      border-radius: 10px;
      border-left: 5px solid var(--orange);
      max-width: 90vw;
      word-wrap: break-word;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    }

    /* ---- Cue Light ---- */
    #cue-wrap {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 10000;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
    }
    #cue-light {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #555;
      box-shadow: 0 0 18px 4px rgba(80,80,80,0.4);
    }
    #cue-light.cue-go {
      background: #00cc44;
      box-shadow: 0 0 40px 14px rgba(0,204,68,0.65);
    }
    #cue-light.cue-standby {
      background: #e00;
      box-shadow: 0 0 40px 14px rgba(220,0,0,0.65);
      animation: cue-blink 2s step-start infinite;
    }
    @keyframes cue-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }
    #cue-label {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      display: none;
    }
    #cue-label.cue-go   { display: block; color: #00cc44; }
    #cue-label.cue-standby { display: block; color: #ff4444; animation: cue-blink 2s step-start infinite; }
  </style>
</head>
<body>
  <!-- Closed-caption announcement overlay -->
  <div id="cc-overlay">
    <div id="cc-text"></div>
  </div>

  <!-- Cue light: fixed overlay, persists across all tab rotations -->
  <div id="cue-wrap">
    <div id="cue-label"></div>
    <div id="cue-light"></div>
  </div>

  <div class="screen" id="app">
    <div class="header">
      <div class="logo">AADS Darts</div>
      <div class="title">Live Event Display</div>
    </div>
    <div class="view-indicator" id="viewIndicator"></div>
    <div id="content"></div>
    <div class="footer" id="status">Connecting...</div>
  </div>

  <script>
    let eventData = null;
    const VIEWS = ['match', 'standings'];
    let viewIndex = 0; // cycles through VIEWS

    // -------------------------------------------------------
    // CLOSED-CAPTION ANNOUNCEMENT
    // -------------------------------------------------------
    let _ccDismissTimer = null;

    function showAnnouncement(text) {
      const overlay = document.getElementById('cc-overlay');
      const el = document.getElementById('cc-text');
      if (!overlay || !el) return;
      if (_ccDismissTimer) { clearTimeout(_ccDismissTimer); _ccDismissTimer = null; }
      el.textContent = text;
      overlay.style.opacity = '1';
      // Auto-dismiss after 30 seconds if not manually cleared
      _ccDismissTimer = setTimeout(() => clearAnnouncement(), 30000);
    }

    function clearAnnouncement() {
      const overlay = document.getElementById('cc-overlay');
      if (!overlay) return;
      overlay.style.opacity = '0';
      if (_ccDismissTimer) { clearTimeout(_ccDismissTimer); _ccDismissTimer = null; }
    }

    // -------------------------------------------------------
    // CUE LIGHT
    // -------------------------------------------------------
    function applyCueLight(state) {
      const el    = document.getElementById('cue-light');
      const label = document.getElementById('cue-label');
      if (!el) return;
      el.className = '';
      if (label) label.className = '';
      if (state === 'go') {
        el.className    = 'cue-go';
        if (label) { label.className = 'cue-go'; label.textContent = 'Bull Up!'; }
      } else if (state === 'standby') {
        el.className    = 'cue-standby';
        if (label) { label.className = 'cue-standby'; label.textContent = 'Stand By'; }
      }
      // 'off' → no class → grey light, no label
    }

    // Normalize data so the TV display works with both old and new event-data.json formats
    function normalizeEventData(data) {
      // --- eventStarted ---
      if (data.eventStarted === undefined) {
        data.eventStarted = !!(data.recentMatches && data.recentMatches.length > 0);
      }

      // Build a sorted combined match list from recentMatches + upcomingMatches
      const allMatchesSorted = [];
      (data.recentMatches || []).forEach(m => allMatchesSorted.push({ ...m, completed: true }));
      (data.upcomingMatches || []).forEach(m => allMatchesSorted.push({ ...m, completed: false }));
      allMatchesSorted.sort((a, b) => a.matchNum - b.matchNum);

      // --- allPairs (for pre-event full schedule) ---
      if (!data.allPairs || data.allPairs.length === 0) {
        data.allPairs = [];
        for (let i = 0; i < allMatchesSorted.length; i += 2) {
          data.allPairs.push({
            board1: allMatchesSorted[i]   || null,
            board2: allMatchesSorted[i+1] || null
          });
        }
      }

      // --- currentPair + nextPair (for live display) ---
      if (!data.currentPair) {
        const upcoming = allMatchesSorted.filter(m => !m.completed);
        const liveMatch = upcoming.find(m => m.board === 1) || upcoming[0] || null;
        if (liveMatch) {
          const sim = upcoming.find(m => m.matchNum === liveMatch.matchNum + 1) || null;
          data.currentPair = { liveMatch, simultaneousMatch: sim };

          const nextBoard1 = upcoming.find(m => m.board === 1 && m.matchNum > liveMatch.matchNum);
          if (nextBoard1) {
            const nextBoard2 = upcoming.find(m => m.matchNum === nextBoard1.matchNum + 1) || null;
            data.nextPair = { board1Match: nextBoard1, board2Match: nextBoard2 };
          }
        }
      }

      return data;
    }

    // Two data sources: raw GitHub (no CDN delay) → fallback to same-origin file
    const RAW_DATA_URL  = 'https://raw.githubusercontent.com/dowdarts/darts-interview-assistant/main/event-data.json';
    const LOCAL_DATA_URL = 'event-data.json';

    async function fetchData() {
      const t = Date.now();
      let data = null;

      // 1. Try raw.githubusercontent.com (bypasses GitHub Pages CDN)
      try {
        const r = await fetch(`${RAW_DATA_URL}?t=${t}`, { cache: 'no-store' });
        if (r.ok) data = await r.json();
      } catch (_) {}

      // 2. Fall back to same-origin event-data.json
      if (!data) {
        try {
          const r = await fetch(`${LOCAL_DATA_URL}?t=${t}`);
          if (r.ok) data = await r.json();
        } catch (_) {}
      }

      if (data) {
        eventData = normalizeEventData(data);
        updateDisplay();
        document.getElementById('status').textContent =
          `Last updated: ${new Date(eventData.timestamp || Date.now()).toLocaleTimeString()}`;
      } else if (!eventData) {
        document.getElementById('status').textContent = 'Waiting for data...';
      }
    }

    function updateDisplay() {
      if (!eventData) return;
      updateViewIndicator();
      const view = VIEWS[viewIndex];
      if (view === 'match')      renderMatchView();
      else if (view === 'standings') renderStandings();
    }

    function updateViewIndicator() {
      const labels = ['Now Playing', 'Standings'];
      document.getElementById('viewIndicator').innerHTML = VIEWS.map((v, i) =>
        `<span class="view-pill ${i === viewIndex ? 'active' : ''}">${labels[i]}</span>`
      ).join('');
    }

    // -------------------------------------------------------
    // PRE-EVENT: full pair schedule (all 10 pairs)
    // -------------------------------------------------------
    function renderPreEventSchedule() {
      const content = document.getElementById('content');
      const pairs = eventData.allPairs || [];

      if (pairs.length === 0) {
        content.innerHTML = `<div class="no-data"><div class="no-data-icon">🏆</div><div class="no-data-text">Loading Schedule...</div></div>`;
        return;
      }

      const rows = pairs.map(p => {
        const b1 = p.board1;
        const b2 = p.board2;
        return `
          <div class="pair-row">
            <div class="pair-time">${b1 ? b1.time : ''}</div>
            <div class="pair-match">
              <span class="board-badge live-board">● Board 1 – Live</span>
              <div class="pair-names">
                ${b1 ? `${b1.player1} <span class="pair-vs">vs</span> ${b1.player2}` : '—'}
              </div>
              ${b1 && (b1.player1Province || b1.player2Province)
                ? `<div class="pair-provinces">${b1.player1Province || ''} · ${b1.player2Province || ''}</div>` : ''}
            </div>
            <div class="pair-divider">+</div>
            <div class="pair-match">
              <span class="board-badge">Board 2</span>
              <div class="pair-names">
                ${b2 ? `${b2.player1} <span class="pair-vs">vs</span> ${b2.player2}` : '—'}
              </div>
              ${b2 && (b2.player1Province || b2.player2Province)
                ? `<div class="pair-provinces">${b2.player1Province || ''} · ${b2.player2Province || ''}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      content.innerHTML = `
        <div class="schedule">
          <div class="schedule-header">Match Schedule</div>
          <div class="pair-grid">${rows}</div>
        </div>`;
    }

    // -------------------------------------------------------
    // COMBINED VIEW: Now Playing (current pair) + Upcoming schedule
    // -------------------------------------------------------
    function renderMatchView() {
      const content = document.getElementById('content');

      // Pre-event: show full pair schedule
      if (!eventData.eventStarted) {
        renderPreEventSchedule();
        return;
      }

      const pair = eventData.currentPair;
      if (!pair || !pair.liveMatch) {
        content.innerHTML = `<div class="no-data"><div class="no-data-icon">🏆</div><div class="no-data-text">Event Complete</div></div>`;
        return;
      }

      const live = pair.liveMatch;
      const sim  = pair.simultaneousMatch;
      const currentNums = new Set([live.matchNum, sim ? sim.matchNum : null].filter(n => n !== null));

      // ---- Current pair cards ----
      const liveCard = `
        <div class="current-match live-primary">
          <div class="match-label">
            <span>Match ${live.matchNum}</span>
            <span class="live-badge"><span class="live-dot"></span> LIVE – BOARD 1</span>
          </div>
          <div class="players">
            <div class="player">
              <div class="player-name">${live.player1}</div>
              ${live.player1Province ? `<div class="player-province">${live.player1Province}</div>` : ''}
            </div>
            <div class="vs">VS</div>
            <div class="player">
              <div class="player-name">${live.player2}</div>
              ${live.player2Province ? `<div class="player-province">${live.player2Province}</div>` : ''}
            </div>
          </div>
          <div class="match-details">
            <div class="detail-item"><span class="detail-label">Board:</span><span class="detail-value">Board 1 (Live Stream)</span></div>
          </div>
        </div>`;

      const simCard = sim ? `
        <div class="current-match sim-match">
          <div class="match-label">
            <span>Match ${sim.matchNum}</span>
            <span class="sim-badge">Also Playing – Board 2</span>
          </div>
          <div class="players">
            <div class="player">
              <div class="player-name">${sim.player1}</div>
              ${sim.player1Province ? `<div class="player-province">${sim.player1Province}</div>` : ''}
            </div>
            <div class="vs">VS</div>
            <div class="player">
              <div class="player-name">${sim.player2}</div>
              ${sim.player2Province ? `<div class="player-province">${sim.player2Province}</div>` : ''}
            </div>
          </div>
        </div>` : '';

      // ---- Airport-style scrolling ticker of upcoming matches ----
      const remaining = (eventData.upcomingMatches || []).filter(m => !currentNums.has(m.matchNum));
      let tickerHtml = '';
      if (remaining.length > 0) {
        const tickerRows = [];
        for (let i = 0; i < remaining.length; i += 2) {
          const b1 = remaining[i];
          const b2 = remaining[i + 1];
          tickerRows.push(`
            <div class="ticker-row">
              <div class="ticker-time">${b1 ? (b1.time || 'TBD') : ''}</div>
              <div class="ticker-match">
                <span class="board-badge live-board">● Board 1</span>
                <div class="ticker-names">${b1 ? `${b1.player1} <span class="pair-vs">vs</span> ${b1.player2}` : '—'}</div>
                ${b1 && (b1.player1Province || b1.player2Province)
                  ? `<div class="pair-provinces">${b1.player1Province || ''} · ${b1.player2Province || ''}</div>` : ''}
              </div>
              <div class="ticker-sep">+</div>
              <div class="ticker-match">
                <span class="board-badge">Board 2</span>
                <div class="ticker-names">${b2 ? `${b2.player1} <span class="pair-vs">vs</span> ${b2.player2}` : '—'}</div>
                ${b2 && (b2.player1Province || b2.player2Province)
                  ? `<div class="pair-provinces">${b2.player1Province || ''} · ${b2.player2Province || ''}</div>` : ''}
              </div>
            </div>`);
        }
        // Duplicate rows for seamless infinite loop
        const numPairs = tickerRows.length;
        const duration = Math.max(8, numPairs * 3); // ~3s per row
        const rowsMarkup = tickerRows.join('');
        tickerHtml = `
          <div class="ticker-bar">
            <div class="ticker-header">
              <span class="ticker-header-dot"></span> Up Next
            </div>
            <div class="ticker-scroll-wrap">
              <div class="ticker-inner" style="animation-duration:${duration}s">
                ${rowsMarkup}
                ${rowsMarkup}
              </div>
            </div>
          </div>`;
      }

      content.innerHTML = `
        <div class="live-layout">
          <div class="live-section">${liveCard}${simCard}</div>
          ${tickerHtml}
        </div>`;
    }

    // -------------------------------------------------------
    // STANDINGS VIEW
    // -------------------------------------------------------
    function renderStandings() {
      const content = document.getElementById('content');
      const sA = eventData.standingsA || [];
      const sB = eventData.standingsB || [];

      if (sA.length === 0 && sB.length === 0) {
        content.innerHTML = `<div class="no-data"><div class="no-data-icon">📋</div><div class="no-data-text">No Standings Yet</div></div>`;
        return;
      }

      const makeTable = (group, label) => {
        const rows = group.map((p, i) => `
          <tr>
            <td>
              <span class="standings-rank">${i + 1}.</span>${p.name}
              ${p.province ? `<span class="standings-province">${p.province}</span>` : ''}
            </td>
            <td class="standings-wins">${p.matchWins}</td>
            <td class="standings-losses">${p.matchLosses}</td>
            <td class="standings-wins">${p.legsWon}</td>
            <td class="standings-losses">${p.legsLost}</td>
          </tr>`).join('');
        return `
          <div class="standings-card">
            <div class="standings-title">${label}</div>
            <table class="standings-table">
              <thead>
                <tr>
                  <th>Player</th>
                  <th>W</th>
                  <th>L</th>
                  <th>LW</th>
                  <th>LL</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      };

      content.innerHTML = `
        <div class="standings-layout">
          ${makeTable(sA, 'Group A')}
          ${makeTable(sB, 'Group B')}
        </div>`;
    }

    function rotateView() {
      try {
        if (!eventData) return;
        viewIndex = (viewIndex + 1) % VIEWS.length;
        const c = document.getElementById('content');
        if (c) { c.style.animation = 'none'; c.offsetHeight; c.style.animation = ''; }
        updateDisplay();
      } catch(e) { console.error('[rotateView]', e); }
    }

    // Rotate views every 20 seconds
    setInterval(rotateView, 20000);

    // -------------------------------------------------------
    // PAIRING CODE CONNECTION (no GitHub token needed)
    // -------------------------------------------------------
    const ADMIN_PEER_CODE = 'AADS40'; // Fixed code — interview app always hosts here
    let _peerConnected = false;
    let _pollingInterval = null;
    let _peerObj = null;

    function _startPolling() {
      if (_pollingInterval) return;
      fetchData();
      // 20 s interval — raw.githubusercontent.com rate-limits heavy anonymous polling
      _pollingInterval = setInterval(fetchData, 20000);
    }

    function _stopPolling() {
      if (_pollingInterval) { clearInterval(_pollingInterval); _pollingInterval = null; }
    }

    function _setStatus(html) {
      const el = document.getElementById('status');
      if (el) el.innerHTML = html;
    }

    function _peerConnect(code) {
      const cleanCode = code.trim().toUpperCase();
      const hostId    = 'darts-' + cleanCode;
      const viewerId  = 'viewer-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

      _setStatus('Connecting to code <b>' + cleanCode + '</b>…');

      if (_peerObj && !_peerObj.destroyed) _peerObj.destroy();

      const peer = new Peer(viewerId, { debug: 0 });
      _peerObj = peer;

      peer.on('open', () => {
        const conn = peer.connect(hostId, { reliable: true, serialization: 'json' });

        // Timeout if host not found within 8s
        const timeout = setTimeout(() => {
          if (!_peerConnected) {
            const pairStatus = document.getElementById('pairStatus');
            if (pairStatus) { pairStatus.style.color='#e53935'; pairStatus.textContent='Host not found — check the code and try again.'; }
            _setStatus('Code not found — using GitHub data.');
            _startPolling();
          }
        }, 8000);

        conn.on('open', () => {
          clearTimeout(timeout);
          _peerConnected = true;
          localStorage.setItem('dartsViewerCode', cleanCode);
          _hidePairOverlay();
          _stopPolling();
          _setStatus('● LIVE — paired to interview app &nbsp; <button onclick="_showPairOverlay()" style="background:none;border:none;color:var(--text-muted);font-size:0.85em;cursor:pointer;text-decoration:underline;">change</button>');
        });

        conn.on('data', (data) => {
          // Cue light control
          if (data && data.type === 'cueLight') {
            applyCueLight(data.state);
            return;
          }
          if (data && data.type === 'announcement') {
            data.text ? showAnnouncement(data.text) : clearAnnouncement();
            return;
          }
          // Handle reset broadcast from admin app
          if (data && data.type === 'reset') {
            eventData = normalizeEventData({});
            updateDisplay();
            return;
          }
          eventData = normalizeEventData(data);
          updateDisplay();
        });

        conn.on('close', () => {
          _peerConnected = false;
          _setStatus('Peer disconnected — reconnecting…');
          _startPolling();
          // Auto-reconnect to admin app after a short delay
          setTimeout(() => { if (!_peerConnected) _peerConnect(ADMIN_PEER_CODE); }, 5000);
        });

        conn.on('error', () => {
          _peerConnected = false;
          _setStatus('Peer error — using GitHub data.');
          _startPolling();
        });
      });

      peer.on('error', () => {
        _peerConnected = false;
        const pairStatus = document.getElementById('pairStatus');
        if (pairStatus) { pairStatus.style.color='#e53935'; pairStatus.textContent='Could not connect — check the code.'; }
        _setStatus('Peer unavailable — using GitHub data.');
        _startPolling();
      });
    }

    function _showPairOverlay() {
      let ov = document.getElementById('pairOverlay');
      if (ov) { ov.style.display = 'flex'; setTimeout(() => document.getElementById('pairInput')?.focus(), 80); return; }

      ov = document.createElement('div');
      ov.id = 'pairOverlay';
      ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1.5rem;';
      ov.innerHTML = `
        <div style="background:#111;border:2px solid var(--orange);border-radius:22px;padding:2.2em 2em;max-width:440px;width:100%;text-align:center;">
          <div style="font-family:var(--font-display);font-size:0.75em;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.3em;">AADS Darts</div>
          <h2 style="font-family:var(--font-display);font-size:2em;font-weight:900;letter-spacing:0.05em;text-transform:uppercase;color:#fff;margin-bottom:0.1em;">TV Display</h2>
          <div style="width:50px;height:3px;background:var(--orange);border-radius:2px;margin:0.5em auto 1.4em;"></div>
          <p style="font-size:0.9em;color:var(--text-muted);margin-bottom:1.4em;line-height:1.7;">
            Enter the <b style="color:#fff;">6-character pairing code</b><br>shown in the interview app.
          </p>
          <input id="pairInput" type="text" maxlength="6" placeholder="AB3X7Q"
            style="width:100%;background:#1a1a1a;border:2px solid var(--orange);color:#fff;padding:0.75em;border-radius:12px;font-size:2em;font-family:monospace;font-weight:900;letter-spacing:0.3em;text-align:center;text-transform:uppercase;outline:none;margin-bottom:0.9em;"
          />
          <button id="pairConnectBtn"
            style="width:100%;background:var(--orange);color:#000;border:none;border-radius:12px;padding:0.85em;font-family:var(--font-display);font-size:1.1em;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-bottom:0.7em;">
            Connect
          </button>
          <div id="pairStatus" style="font-size:0.82em;color:var(--text-muted);min-height:1.3em;margin-bottom:0.8em;"></div>
          <button id="pairGithubBtn"
            style="background:none;border:none;color:var(--text-muted);font-size:0.8em;cursor:pointer;text-decoration:underline;">
            Use GitHub data instead
          </button>
        </div>`;

      document.body.appendChild(ov);

      const input = ov.querySelector('#pairInput');
      setTimeout(() => input?.focus(), 80);
      input.addEventListener('input',  () => { input.value = input.value.toUpperCase(); });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') _doPairConnect(); });
      ov.querySelector('#pairConnectBtn').addEventListener('click', _doPairConnect);
      ov.querySelector('#pairGithubBtn').addEventListener('click', () => {
        _hidePairOverlay(); _startPolling();
      });
    }

    function _hidePairOverlay() {
      const ov = document.getElementById('pairOverlay');
      if (ov) ov.style.display = 'none';
    }

    function _doPairConnect() {
      const code = (document.getElementById('pairInput')?.value || '').trim().toUpperCase();
      const pairStatus = document.getElementById('pairStatus');
      if (code.length < 4) {
        if (pairStatus) { pairStatus.style.color = '#e53935'; pairStatus.textContent = 'Enter the 6-character code from the interview app.'; }
        return;
      }
      if (pairStatus) { pairStatus.style.color = 'var(--text-muted)'; pairStatus.textContent = 'Connecting…'; }
      _peerConnect(code);
    }

    // Keep retrying the peer connection every 12 seconds if not connected
    setInterval(() => {
      if (!_peerConnected) _peerConnect(ADMIN_PEER_CODE);
    }, 12000);

    // -------------------------------------------------------
    // SCREEN WAKE LOCK — prevents TV/monitor from sleeping
    // -------------------------------------------------------
    let _wakeLock = null;

    async function _requestWakeLock() {
      if (!('wakeLock' in navigator)) return; // API not supported (non-Chromium)
      try {
        _wakeLock = await navigator.wakeLock.request('screen');
        console.log('[WakeLock] Screen wake lock acquired.');
        _wakeLock.addEventListener('release', () => {
          console.log('[WakeLock] Screen wake lock released.');
        });
      } catch (err) {
        console.warn('[WakeLock] Could not acquire wake lock:', err.message);
      }
    }

    // Re-acquire wake lock when the page becomes visible again
    // (browsers automatically release it when the tab is hidden)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        _requestWakeLock();
      }
    });

    // -------------------------------------------------------
    // DIRECT CUE LIGHT HOST
    // The TV display hosts its own fixed peer so the cue light
    // controller can connect directly — no interview app needed.
    // Pairing code for the cue controller: AADSCUE
    // -------------------------------------------------------
    const CUE_HOST_CODE = 'AADSCUE';
    let _cueHostPeer = null;

    function _startCueHost() {
      if (_cueHostPeer && !_cueHostPeer.destroyed) return;
      try {
        const p = new Peer('darts-' + CUE_HOST_CODE, { debug: 0 });
        _cueHostPeer = p;

        p.on('open', () => {
          console.log('[CueHost] Direct cue host ready at', CUE_HOST_CODE);
        });

        p.on('connection', (conn) => {
          conn.on('data', (msg) => {
            if (msg && msg.type === 'cueLight') { applyCueLight(msg.state); return; }
            if (msg && msg.type === 'announcement') { msg.text ? showAnnouncement(msg.text) : clearAnnouncement(); }
          });
        });

        p.on('error', (err) => {
          if (err.type === 'unavailable-id') {
            // Another TV is already hosting this code — retry in 10s with a unique suffix
            console.warn('[CueHost] AADSCUE in use, retrying in 10s…');
            setTimeout(() => {
              _cueHostPeer = null;
              _startCueHost();
            }, 10000);
          }
        });

        p.on('disconnected', () => {
          if (!p.destroyed) p.reconnect();
        });
      } catch (e) {
        console.warn('[CueHost] PeerJS not available:', e);
      }
    }

    // On load: show display immediately via GitHub polling,
    // then silently attempt live peer connection to the admin app.
    window.addEventListener('load', () => {
      // Prevent the screen from sleeping while the TV display is open
      _requestWakeLock();

      // Start GitHub polling immediately — no blocking overlay
      _startPolling();
      _setStatus('Loading display data\u2026');

      // Host a direct cue light peer so the cue controller can connect without the interview app
      _startCueHost();

      // Silently attempt live peer connection to the admin app
      _peerConnect(ADMIN_PEER_CODE);
      setTimeout(() => {
        if (!_peerConnected) _setStatus('Live from GitHub data.');
      }, 9000);
    });
  </script>
</body>
</html>
